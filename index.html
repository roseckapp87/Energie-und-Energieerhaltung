// ANSWER HANDLERS
function answerChoice(idx, correct) {
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === correct) b.classList.add('correct');
    if (i === idx && i !== correct) b.classList.add('incorrect');
  });

  const task = currentTasks[currentTaskIdx];
  const taskKey = `${currentLevelData.id}-${currentTaskIdx}`;
  S.levels[currentLevelData.id].taskAttempts[taskKey] = (S.levels[currentLevelData.id].taskAttempts[taskKey] || 0) + 1;

  if (idx === correct) {
    handleCorrect(task, taskKey);
  } else {
    handleIncorrect(task, taskKey);
  }
}

function answerCalc() {
  const input = document.getElementById('calcInput');
  const val = parseFloat(input.value);
  const task = currentTasks[currentTaskIdx];
  const taskKey = `${currentLevelData.id}-${currentTaskIdx}`;
  S.levels[currentLevelData.id].taskAttempts[taskKey] = (S.levels[currentLevelData.id].taskAttempts[taskKey] || 0) + 1;

  if (isNaN(val)) {
    showNotification('Bitte gib eine Zahl ein.', '');
    return;
  }

  if (Math.abs(val - task.answer) <= task.tolerance) {
    handleCorrect(task, taskKey);
  } else {
    handleIncorrect(task, taskKey);
  }
}

function answerText() {
  const input = document.getElementById('textInput');
  const val = input.value.trim();
  const task = currentTasks[currentTaskIdx];
  const taskKey = `${currentLevelData.id}-${currentTaskIdx}`;
  S.levels[currentLevelData.id].taskAttempts[taskKey] = (S.levels[currentLevelData.id].taskAttempts[taskKey] || 0) + 1;

  if (val.length < 10) {
    showNotification('Bitte schreibe eine ausführlichere Antwort.', '');
    return;
  }

  const result = evaluateTextAnswer(val, task);
  if (result.correct) {
    handleCorrect(task, taskKey);
  } else {
    handleIncorrect(task, taskKey);
  }
}

function evaluateTextAnswer(text, task) {
  const t = text.toLowerCase().replace(/[.,!?;:'"()-]/g, ' ').replace(/\s+/g, ' ');
  const words = task.acceptWords || [];
  
  // Build word stems for fuzzy matching
  function normalize(w) { return w.toLowerCase().replace(/[.,!?;:'"()-]/g, ''); }
  function stemMatch(text, word) {
    const w = normalize(word);
    if (w.length <= 3) return text.includes(w);
    // Check exact, then stem (first 4+ chars)
    if (text.includes(w)) return true;
    const stem = w.substring(0, Math.max(4, Math.floor(w.length * 0.7)));
    return text.includes(stem);
  }

  let matchCount = 0;
  let matchedWords = [];
  words.forEach(w => {
    if (stemMatch(t, w)) { matchCount++; matchedWords.push(w); }
  });

  // Also check for negation errors (saying the opposite)
  const negations = ['nicht', 'kein', 'nie', 'falsch', 'unmöglich'];
  const hasNegation = negations.some(n => t.includes(n));

  // Scoring: need at least 30% of keywords OR 2 keywords, whichever is lower
  const threshold = Math.max(1, Math.min(2, Math.ceil(words.length * 0.3)));
  
  // Bonus: longer answers with some keywords are more likely correct
  const lengthBonus = val.length > 60 ? 1 : 0;
  
  const correct = (matchCount + lengthBonus) >= threshold;
  return { correct, matchCount, total: words.length, matchedWords };
}

function answerDiagram(idx, isCorrect) {
  const task = currentTasks[currentTaskIdx];
  const taskKey = `${currentLevelData.id}-${currentTaskIdx}`;
  S.levels[currentLevelData.id].taskAttempts[taskKey] = (S.levels[currentLevelData.id].taskAttempts[taskKey] || 0) + 1;
  
  const opts = document.querySelectorAll('.diagram-option');
  opts.forEach(o => o.style.pointerEvents = 'none');

  if (isCorrect) {
    opts[idx].style.borderColor = 'var(--success)';
    handleCorrect(task, taskKey);
  } else {
    opts[idx].style.borderColor = 'var(--danger)';
    opts.forEach((o, i) => {
      if (task.options[i].correct) o.style.borderColor = 'var(--success)';
    });
    handleIncorrect(task, taskKey);
  }
}

function selectMatch(side, idx) {
  if (matchState.matched.includes(idx)) return;

  if (matchState.selected === null) {
    matchState.selected = { side, idx };
    document.querySelector(`[data-side="${side}"][data-idx="${idx}"]`).classList.add('selected');
  } else {
    if (matchState.selected.side === side) {
      document.querySelector(`[data-side="${matchState.selected.side}"][data-idx="${matchState.selected.idx}"]`).classList.remove('selected');
      matchState.selected = { side, idx };
      document.querySelector(`[data-side="${side}"][data-idx="${idx}"]`).classList.add('selected');
    } else {
      // Check match
      const leftIdx = side === 'left' ? idx : matchState.selected.idx;
      const rightIdx = side === 'right' ? idx : matchState.selected.idx;

      const prevEl = document.querySelector(`[data-side="${matchState.selected.side}"][data-idx="${matchState.selected.idx}"]`);
      const curEl = document.querySelector(`[data-side="${side}"][data-idx="${idx}"]`);

      if (leftIdx === rightIdx) {
        prevEl.classList.remove('selected');
        prevEl.classList.add('matched-correct');
        curEl.classList.add('matched-correct');
        matchState.matched.push(leftIdx);
      } else {
        prevEl.classList.remove('selected');
        prevEl.classList.add('matched-wrong');
        curEl.classList.add('matched-wrong');
        setTimeout(() => {
          prevEl.classList.remove('matched-wrong');
          curEl.classList.remove('matched-wrong');
        }, 800);
      }
      matchState.selected = null;

      // Check if all matched
      if (matchState.matched.length === matchState.pairs.length) {
        const task = currentTasks[currentTaskIdx];
        const taskKey = `${currentLevelData.id}-${currentTaskIdx}`;
        handleCorrect(task, taskKey);
      }
    }
  }
}

function answerReflect() {
  const input = document.getElementById('textInput');
  if (input.value.trim().length > 0) {
    S.journal.push({ date: new Date().toISOString(), level: currentLevelData.id, text: input.value.trim() });
    saveState();
    handleCorrect(currentTasks[currentTaskIdx], `${currentLevelData.id}-${currentTaskIdx}`);
  }
}

// SLIDER TASK
function answerSlider() {
  const val = parseFloat(document.getElementById('taskSlider').value);
  const task = currentTasks[currentTaskIdx];
  const taskKey = `${currentLevelData.id}-${currentTaskIdx}`;
  S.levels[currentLevelData.id].taskAttempts[taskKey] = (S.levels[currentLevelData.id].taskAttempts[taskKey] || 0) + 1;
  if (Math.abs(val - task.answer) <= task.tolerance) {
    handleCorrect(task, taskKey);
  } else {
    handleIncorrect(task, taskKey);
  }
}

// SORT TASK
let sortOrder = [];
function selectSortItem(el) {
  const target = document.getElementById('sortTarget');
  const placeholder = document.getElementById('sortPlaceholder');
  if (placeholder) placeholder.remove();
  const clone = el.cloneNode(true);
  clone.onclick = null;
  clone.classList.add('matched-correct');
  clone.style.opacity = '0.7';
  clone.style.cursor = 'default';
  target.appendChild(clone);
  el.style.display = 'none';
  sortOrder.push(parseInt(el.dataset.sortVal));
}

function resetSort() {
  sortOrder = [];
  document.getElementById('sortTarget').innerHTML = '<p class="text-xs text-muted" id="sortPlaceholder">⬇️ Gewählte Reihenfolge erscheint hier</p>';
  document.querySelectorAll('#sortSource .match-item').forEach(el => { el.style.display = 'block'; });
}

function answerSort() {
  const task = currentTasks[currentTaskIdx];
  const taskKey = `${currentLevelData.id}-${currentTaskIdx}`;
  S.levels[currentLevelData.id].taskAttempts[taskKey] = (S.levels[currentLevelData.id].taskAttempts[taskKey] || 0) + 1;
  if (sortOrder.length !== task.items.length) {
    showNotification('Bitte ordne alle Elemente ein!', '');
    return;
  }
  const isCorrect = sortOrder.every((v, i) => v === i);
  if (isCorrect) {
    handleCorrect(task, taskKey);
  } else {
    handleIncorrect(task, taskKey);
  }
}

// FILL-IN TASK
function answerFillin() {
  const task = currentTasks[currentTaskIdx];
  const taskKey = `${currentLevelData.id}-${currentTaskIdx}`;
  S.levels[currentLevelData.id].taskAttempts[taskKey] = (S.levels[currentLevelData.id].taskAttempts[taskKey] || 0) + 1;
  let allCorrect = true;
  task.blanks.forEach((blank, i) => {
    const sel = document.getElementById(`fillin_${i}`);
    if (sel.value !== blank.correct) {
      allCorrect = false;
      sel.style.borderColor = 'var(--danger)';
      sel.style.background = 'rgba(225,112,85,0.15)';
    } else {
      sel.style.borderColor = 'var(--success)';
      sel.style.background = 'rgba(0,184,148,0.15)';
    }
  });
  if (allCorrect) {
    handleCorrect(task, taskKey);
  } else {
    handleIncorrect(task, taskKey);
  }
}

function handleCorrect(task, taskKey) {
  currentCorrect++;
  const attempts = S.levels[currentLevelData.id].taskAttempts[taskKey] || 1;
  const hints = S.levels[currentLevelData.id].hintsUsed[taskKey] || 0;
  const xp = getXPForAttempt(task.xp, attempts, hints);
  addXP(xp, 'Richtige Antwort');
  S.levels[currentLevelData.id].taskResults[taskKey] = true;

  S.answers.push({
    level: currentLevelData.id,
    task: currentTaskIdx,
    question: task.q,
    correct: true,
    attempts,
    hints,
    xp,
    explain: task.explain,
    timestamp: Date.now()
  });

  showFeedback(true, task, xp);
}

function handleIncorrect(task, taskKey) {
  const attempts = S.levels[currentLevelData.id].taskAttempts[taskKey] || 1;
  S.levels[currentLevelData.id].taskResults[taskKey] = false;
  S.answers.push({
    level: currentLevelData.id,
    task: currentTaskIdx,
    question: task.q,
    correct: false,
    attempts,
    hints: S.levels[currentLevelData.id].hintsUsed[taskKey] || 0,
    xp: 0,
    explain: task.explain,
    timestamp: Date.now()
  });
  showFeedback(false, task, 0);
}

function showFeedback(correct, task, xp) {
  const area = document.getElementById('feedbackArea');
  
  // Build correct answer display for incorrect answers
  let correctAnswerHTML = '';
  if (!correct) {
    if (task.type === 'choice') {
      correctAnswerHTML = `<p class="text-sm fw-bold mt-1" style="color:var(--success);">✅ Richtige Antwort: ${task.options[task.correct]}</p>`;
    } else if (task.type === 'calc' || task.type === 'slider') {
      correctAnswerHTML = `<p class="text-sm fw-bold mt-1" style="color:var(--success);">✅ Richtige Antwort: ${task.answer} ${task.unit}</p>`;
    } else if (task.type === 'diagram') {
      const ci = task.options.findIndex(o => o.correct);
      correctAnswerHTML = `<p class="text-sm fw-bold mt-1" style="color:var(--success);">✅ Richtig: ${task.options[ci]?.label || ''}</p>`;
    } else if (task.type === 'sort') {
      correctAnswerHTML = `<p class="text-sm fw-bold mt-1" style="color:var(--success);">✅ Richtige Reihenfolge:</p>` + task.items.map((it,i) => `<p class="text-xs" style="color:var(--success);">${i+1}. ${it}</p>`).join('');
    } else if (task.type === 'fillin') {
      correctAnswerHTML = `<p class="text-sm fw-bold mt-1" style="color:var(--success);">✅ Richtige Antworten:</p>` + task.blanks.map((b,i) => `<p class="text-xs" style="color:var(--success);">Lücke ${i+1}: ${b.correct}</p>`).join('');
    } else if (task.type === 'match') {
      correctAnswerHTML = `<p class="text-sm fw-bold mt-1" style="color:var(--success);">✅ Richtige Zuordnung:</p>` + task.pairs.map(p => `<p class="text-xs" style="color:var(--success);">${p[0]} → ${p[1]}</p>`).join('');
    }
  }

  area.innerHTML = `
    <div class="card" style="border-color: ${correct ? 'var(--success)' : 'var(--danger)'};">
      ${avatarBubble(
        correct ? getCorrectPhrase() : getIncorrectPhrase(),
        correct ? 'cheer' : 'sad'
      )}
      ${correct ? `<p class="text-accent fw-bold mt-1" style="text-align:center;">+${xp} XP ⚡</p>` : ''}
      ${correctAnswerHTML}
      <div class="help-panel mt-1">
        <h4>📖 ${correct ? 'Erklärung' : 'Die richtige Lösung'}</h4>
        <p class="text-sm">${task.explain}</p>
      </div>
      <button class="btn btn-primary btn-block mt-2" onclick="nextTask()">Weiter →</button>
    </div>
  `;
  document.getElementById('hintArea').innerHTML = '';
}

function nextTask() {
  currentTaskIdx++;
  renderTask();
}

function showHint() {
  const task = currentTasks[currentTaskIdx];
  const taskKey = `${currentLevelData.id}-${currentTaskIdx}`;
  const level = S.levels[currentLevelData.id];
  const hintIdx = level.hintsUsed[taskKey] || 0;

  if (!task.hints || hintIdx >= task.hints.length) {
    showNotification('Keine weiteren Hilfen verfügbar.', '');
    return;
  }

  level.hintsUsed[taskKey] = hintIdx + 1;
  saveState();

  const currentHintCount = level.hintsUsed[taskKey];
  const xpPercent = [100, 80, 60, 40][Math.min(currentHintCount, 3)];

  // Build all revealed hints
  let hintsHTML = '';
  for (let i = 0; i < currentHintCount; i++) {
    hintsHTML += `
      <div class="hint-step">
        <div class="hint-step-num">${i + 1}</div>
        <p class="text-sm">${task.hints[i]}</p>
      </div>
    `;
  }

  const area = document.getElementById('hintArea');
  area.innerHTML = `
    <div class="card" style="border-color: var(--accent); padding: 1rem;">
      ${avatarBubble(getHintIntro(currentHintCount - 1), 'tip')}
      <div class="hint-history">
        ${hintsHTML}
      </div>
      <div class="hint-xp-warning">
        ⚠️ XP-Faktor nach ${currentHintCount} Hilfe${currentHintCount > 1 ? 'n' : ''}: ${xpPercent}%
      </div>
      ${currentHintCount < (task.hints?.length || 0) ? `
        <button class="btn btn-secondary btn-small mt-1" onclick="showHint()">
          💡 Nächste Hilfe (Stufe ${currentHintCount + 1}/${task.hints.length})
        </button>
      ` : '<p class="text-xs text-muted mt-1">Keine weiteren Hilfen verfügbar.</p>'}
    </div>
  `;
}

// ============================================================
// SIMULATION
// ============================================================
function showSimulation() {
  const el = document.getElementById('screen-game');
  const sim = currentLevelData.sim;
  if (teacherMode) updateTeacherPanel();

  el.innerHTML = `
    <div class="card card-glow">
      <h2>🔬 ${sim.title}</h2>
      <p class="text-sm text-muted">${sim.desc}</p>
    </div>
    <div class="sim-container">
      <div class="sim-canvas-wrap">
        <canvas id="simCanvas" width="800" height="400"></canvas>
      </div>
      <div id="simControls" class="sim-controls"></div>
      <div class="energy-bars mt-1" id="energyBars"></div>
    </div>
    <button class="btn btn-primary btn-block mt-2" onclick="endSimulation()">Weiter zu den Aufgaben →</button>
    ${teacherMode ? `<button class="btn btn-secondary btn-block mt-1" style="border-color:#e17055;color:#e17055;" onclick="teacherSkipToFinish()">🎓 Direkt zum nächsten Level →</button>` : ''}
  `;

  initSimulation(sim.type);
}

function initSimulation(type) {
  if (currentAnimId) { cancelAnimationFrame(currentAnimId); currentAnimId = null; }
  const canvas = document.getElementById('simCanvas');
  const ctx = canvas.getContext('2d');
  const controls = document.getElementById('simControls');
  const bars = document.getElementById('energyBars');
  let simRunning = false;

  // HiDPI / Retina support for iPad
  const dpr = window.devicePixelRatio || 1;
  const canvasW = 800;
  const canvasH = 400;
  canvas.width = canvasW * dpr;
  canvas.height = canvasH * dpr;
  canvas.style.width = '100%';
  canvas.style.height = 'auto';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  function renderBars(epot, ekin, esp, ewarm) {
    const total = Math.max(epot + ekin + (esp || 0) + (ewarm || 0), 1);
    bars.innerHTML = `
      <div class="e-bar-col">
        <div class="e-bar"><div class="e-bar-fill" style="height:${(epot/total)*100}%;background:var(--accent);"></div></div>
        <div class="e-bar-label">Lage</div>
        <div class="e-bar-value">${Math.round(epot)} J</div>
      </div>
      <div class="e-bar-col">
        <div class="e-bar"><div class="e-bar-fill" style="height:${(ekin/total)*100}%;background:var(--accent2);"></div></div>
        <div class="e-bar-label">Kinetisch</div>
        <div class="e-bar-value">${Math.round(ekin)} J</div>
      </div>
      ${esp !== undefined ? `<div class="e-bar-col">
        <div class="e-bar"><div class="e-bar-fill" style="height:${((esp||0)/total)*100}%;background:var(--accent3);"></div></div>
        <div class="e-bar-label">Spann</div>
        <div class="e-bar-value">${Math.round(esp||0)} J</div>
      </div>` : ''}
      ${ewarm !== undefined ? `<div class="e-bar-col">
        <div class="e-bar"><div class="e-bar-fill" style="height:${((ewarm||0)/total)*100}%;background:var(--danger);"></div></div>
        <div class="e-bar-label">Wärme</div>
        <div class="e-bar-value">${Math.round(ewarm||0)} J</div>
      </div>` : ''}
      <div class="e-bar-col">
        <div class="e-bar"><div class="e-bar-fill" style="height:100%;background:var(--accent5);"></div></div>
        <div class="e-bar-label">Gesamt</div>
        <div class="e-bar-value">${Math.round(epot + ekin + (esp||0) + (ewarm||0))} J</div>
      </div>
    `;
  }

  function cl() { ctx.fillStyle = '#0a0f1e'; ctx.fillRect(0, 0, 800, 400); }
  function drawGround(y) { ctx.fillStyle = '#1a2f3d'; ctx.fillRect(0, y, 800, 400 - y); ctx.strokeStyle='#2a4a5a'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(800,y); ctx.stroke(); }
  function drawBall(x, y, r, color) {
    const g = ctx.createRadialGradient(x - r*0.3, y - r*0.3, r*0.1, x, y, r);
    g.addColorStop(0, color); g.addColorStop(0.7, color); g.addColorStop(1, '#0a0f1e');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1; ctx.stroke();
  }
  function drawText(text, x, y, size, color) { ctx.fillStyle = color||'#e8edf5'; ctx.font = `${size||13}px Nunito`; ctx.fillText(text, x, y); }
  function drawDash(x1,y1,x2,y2,c) { ctx.setLineDash([4,4]); ctx.strokeStyle=c||'rgba(78,205,196,0.25)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); ctx.setLineDash([]); }

  // Universal sim state
  let simPaused = false;
  let simNeedsReset = false;

  function simControlButtons(extraBefore) {
    return `
      ${extraBefore || ''}
      <button class="btn btn-primary btn-small" onclick="document.getElementById('simCanvas').dataset.simStart='1'">▶ Starten</button>
      <button class="btn btn-secondary btn-small" onclick="document.getElementById('simCanvas').dataset.simReset='1'">🔄 Zurücksetzen</button>
      <button class="btn btn-secondary btn-small" id="simPauseBtn" onclick="this.dataset.sp=this.dataset.sp==='1'?'0':'1';this.textContent=this.dataset.sp==='1'?'⏸ Pause':'▶ Weiter'" data-sp="0">▶ Weiter</button>
    `;
  }
  function checkSimControls() {
    if (canvas.dataset.simReset === '1') { simNeedsReset = true; simPaused = false; canvas.dataset.simReset = '0'; const pb=document.getElementById('simPauseBtn'); if(pb) pb.dataset.sp='0'; }
    if (canvas.dataset.simStart === '1') { simPaused = false; canvas.dataset.simStart = '0'; const pb=document.getElementById('simPauseBtn'); if(pb){pb.dataset.sp='1';pb.textContent='⏸ Pause';} }
    simPaused = document.getElementById('simPauseBtn')?.dataset.sp === '0';
  }

  // ===== PENDULUM (Level 0) =====
  if (type === 'pendulum') {
    let angle = Math.PI/3, angVel = 0;
    const L = 160, g = 9.81, px = 400, py = 50;
    let trail = [];
    controls.innerHTML = simControlButtons(`
      <div class="slider-group"><label>Startwinkel: <span id="sA">60</span>°</label>
      <input type="range" min="10" max="85" value="60" id="slAngle" oninput="document.getElementById('sA').textContent=this.value"></div>
      <div class="slider-group"><label>Masse: <span id="sM">2</span> kg</label>
      <input type="range" min="1" max="10" value="2" id="slMass" oninput="document.getElementById('sM').textContent=this.value"></div>
    `);
    function loop() {
      checkSimControls();
      if (simNeedsReset) {
        angle = parseInt(document.getElementById('slAngle')?.value||60) * Math.PI/180;
        angVel = 0; trail = []; simNeedsReset = false;
      }
      const mass = parseInt(document.getElementById('sM')?.textContent || 2);
      if (!simPaused) {
        const acc = -(g / (L/100)) * Math.sin(angle);
        angVel += acc * 0.016; angVel *= 0.9995; angle += angVel * 0.016;
      }
      const bx = px + L * Math.sin(angle), by = py + L * Math.cos(angle);
      const h = L*(1 - Math.cos(angle))/100, v = Math.abs(angVel)*L/100;
      const ep = mass*10*h, ek = 0.5*mass*v*v;
      trail.push({x:bx,y:by}); if(trail.length>80) trail.shift();
      cl();
      // Trail
      trail.forEach((p,i)=>{ ctx.fillStyle=`rgba(78,205,196,${i/trail.length*0.3})`; ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill(); });
      // String
      ctx.strokeStyle='#8a9bc0'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(bx,by); ctx.stroke();
      // Pivot
      ctx.fillStyle='#5a6e96'; ctx.fillRect(px-40,py-6,80,12); ctx.fillStyle='#4ecdc4'; ctx.beginPath(); ctx.arc(px,py,5,0,Math.PI*2); ctx.fill();
      // Reference line
      drawDash(0, py+L, 800, py+L);
      drawDash(px, py, px, py+L, 'rgba(255,107,107,0.2)');
      // Height arrow
      if (h > 0.05) {
        ctx.strokeStyle='#ff6b6b'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(bx+30,by); ctx.lineTo(bx+30,py+L); ctx.stroke();
        drawText(`h=${h.toFixed(2)}m`, bx+36, (by+py+L)/2+4, 11, '#ff6b6b');
      }
      // Ball
      const ballR = 14 + mass*2;
      drawBall(bx, by, ballR, '#4ecdc4');
      drawText(`${mass} kg`, bx-12, by+4, 11, '#0f1729');
      // Velocity arrow
      if (v > 0.2) {
        const vx = angVel * L * Math.cos(angle) / 100;
        const vy = -angVel * L * Math.sin(angle) / 100;
        const scale = 15;
        ctx.strokeStyle='#ffd93d'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx+vx*scale,by+vy*scale); ctx.stroke();
        // arrowhead
        const aLen=8, aAng=Math.atan2(vy,vx);
        ctx.beginPath(); ctx.moveTo(bx+vx*scale,by+vy*scale);
        ctx.lineTo(bx+vx*scale-aLen*Math.cos(aAng-0.4),by+vy*scale-aLen*Math.sin(aAng-0.4));
        ctx.moveTo(bx+vx*scale,by+vy*scale);
        ctx.lineTo(bx+vx*scale-aLen*Math.cos(aAng+0.4),by+vy*scale-aLen*Math.sin(aAng+0.4));
        ctx.stroke();
      }
      // Info box
      ctx.fillStyle='rgba(15,23,41,0.8)'; ctx.fillRect(10,360,250,35); ctx.strokeStyle='var(--border)'; ctx.strokeRect(10,360,250,35);
      drawText(`v = ${v.toFixed(2)} m/s  |  h = ${h.toFixed(2)} m`, 18, 382, 12);
      renderBars(ep, ek);
      currentAnimId = requestAnimationFrame(loop);
    }
    loop();

  // ===== ELEVATOR (Level 1) =====
  } else if (type === 'elevator') {
    let cabY = 320, targetY = 320, cabV = 0;
    controls.innerHTML = simControlButtons(`
      <div class="slider-group"><label>Masse: <span id="eM">70</span> kg</label>
      <input type="range" min="20" max="200" value="70" oninput="document.getElementById('eM').textContent=this.value"></div>
      <div class="slider-group"><label>Zieletage: <span id="eF">1</span></label>
      <input type="range" min="1" max="10" value="1" id="slFloor" oninput="document.getElementById('eF').textContent=this.value"></div>
    `);
    function loop() {
      checkSimControls();
      if (simNeedsReset) { cabY=320; targetY=320; cabV=0; simNeedsReset=false; }
      const m = parseInt(document.getElementById('eM')?.textContent||70);
      const floor = parseInt(document.getElementById('eF')?.textContent||1);
      const h = floor * 3;
      targetY = 340 - (floor-1) * 30;
      if (!simPaused) {
        const diff = targetY - cabY;
        if (Math.abs(diff) > 1) { cabV = diff * 0.03; cabY += cabV; } 
        else { cabY = targetY; cabV = 0; }
      }
      const currentFloor = Math.round((340 - cabY) / 30) + 1;
      const currentH = (currentFloor - 1) * 3;
      const ep = m * 10 * currentH;
      const ek = 0.5 * m * Math.abs(cabV * 3) * Math.abs(cabV * 3);
      cl();
      // Building
      for (let i = 0; i < 10; i++) {
        const fy = 340 - i*30;
        ctx.fillStyle = i % 2 === 0 ? '#151f35' : '#1a2540';
        ctx.fillRect(300, fy-30, 200, 30);
        ctx.strokeStyle='#2a3a5a'; ctx.strokeRect(300, fy-30, 200, 30);
        drawText(`${i+1}F`, 270, fy-10, 11, '#5a6e96');
        // Windows
        for (let w=0; w<3; w++) {
          ctx.fillStyle = Math.random() > 0.3 ? 'rgba(255,217,61,0.15)' : 'rgba(78,205,196,0.1)';
          ctx.fillRect(310+w*60, fy-25, 40, 20);
        }
      }
      // Shaft
      ctx.fillStyle='rgba(30,45,77,0.8)'; ctx.fillRect(380, 40, 40, 310);
      // Cable
      ctx.strokeStyle='#5a6e96'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(400,40); ctx.lineTo(400,cabY-20); ctx.stroke();
      // Cabin
      ctx.fillStyle='#4ecdc4'; ctx.fillRect(375, cabY-20, 50, 30);
      ctx.fillStyle='#0f1729'; ctx.fillRect(395, cabY-18, 12, 26);
      drawText(`${m}kg`, 378, cabY+2, 9, '#0f1729');
      // Height indicator
      ctx.fillStyle='rgba(15,23,41,0.85)'; ctx.fillRect(510,100,170,80); ctx.strokeStyle='var(--border)'; ctx.strokeRect(510,100,170,80);
      drawText(`Etage: ${currentFloor}`, 520, 122, 14, '#4ecdc4');
      drawText(`Höhe: ${currentH} m`, 520, 142, 13);
      drawText(`E_pot = ${ep.toLocaleString()} J`, 520, 162, 13, '#ffd93d');
      drawGround(370);
      renderBars(ep, ek);
      currentAnimId = requestAnimationFrame(loop);
    }
    loop();

  // ===== HALFPIPE (Level 2) =====
  } else if (type === 'halfpipe') {
    // Ball rolls inside a U-shaped halfpipe. Angle 0 = left rim, PI = right rim, PI/2 = bottom
    let angle = 0.3, angVel = 0; // start near left rim
    const R = 150, cx = 400, cy = 180;
    let trail = [];
    controls.innerHTML = simControlButtons(`
      <div class="slider-group"><label>Starthöhe: <span id="hpH">85</span>%</label>
      <input type="range" min="20" max="95" value="85" id="slHP" oninput="document.getElementById('hpH').textContent=this.value"></div>
      <div class="slider-group"><label>Reibung: <span id="hpF">1</span>%</label>
      <input type="range" min="0" max="15" value="1" id="slFric" oninput="document.getElementById('hpF').textContent=this.value"></div>
      <div class="slider-group"><label>Masse: <span id="hpM">5</span> kg</label>
      <input type="range" min="1" max="20" value="5" id="slHPM" oninput="document.getElementById('hpM').textContent=this.value"></div>
    `);
    function loop() {
      checkSimControls();
      if (simNeedsReset) {
        const startPct = parseInt(document.getElementById('slHP')?.value||85)/100;
        angle = (1-startPct) * Math.PI; // high % = near rim = small angle
        angVel = 0; trail = []; simNeedsReset = false;
      }
      const friction = parseInt(document.getElementById('hpF')?.textContent||1)/1000;
      const m = parseInt(document.getElementById('hpM')?.textContent||5);
      if (!simPaused) {
        // Gravity component along the arc: g * cos(angle) pulls toward bottom (PI/2)
        const grav = 9.81;
        const acc = (grav / (R/100)) * Math.cos(angle); // positive = toward PI
        angVel += acc * 0.016;
        angVel *= (1 - friction); // damping
        angle += angVel * 0.016;
        // Bounce off rims
        if (angle < 0.02) { angle = 0.02; angVel = Math.abs(angVel) * 0.95; }
        if (angle > Math.PI - 0.02) { angle = Math.PI - 0.02; angVel = -Math.abs(angVel) * 0.95; }
      }
      // Ball position on the arc (0=left, PI=right, PI/2=bottom)
      const bx = cx - R * Math.cos(angle); // left=cx-R, right=cx+R
      const by = cy + R * Math.sin(angle); // bottom=cy+R
      const bottomY = cy + R;
      const h = Math.max(0, (bottomY - by) / 100 * 4); // scale to meters
      const v = Math.abs(angVel) * R / 100;
      const ep = m * 10 * h;
      const ek = 0.5 * m * v * v;
      trail.push({x:bx, y:by}); if (trail.length > 80) trail.shift();
      cl();
      // Halfpipe U-shape (bottom half of circle)
      ctx.strokeStyle='#2a4a5a'; ctx.lineWidth=8;
      ctx.beginPath(); ctx.arc(cx, cy, R+4, 0, Math.PI, false); ctx.stroke();
      ctx.strokeStyle='#4ecdc4'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI, false); ctx.stroke();
      // Side walls extending up
      ctx.fillStyle='#1a2f3d';
      ctx.fillRect(cx-R-8, cy-80, 12, 80+R);
      ctx.fillRect(cx+R-4, cy-80, 12, 80+R);
      // Reference line at bottom
      drawDash(cx-R-30, bottomY, cx+R+30, bottomY, 'rgba(78,205,196,0.15)');
      // Trail
      trail.forEach((p,i) => {
        ctx.fillStyle = `rgba(255,107,107,${i/trail.length*0.35})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, Math.PI*2); ctx.fill();
      });
      // Height indicator
      if (h > 0.1) {
        ctx.strokeStyle='rgba(255,217,61,0.5)'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.moveTo(bx, by+14); ctx.lineTo(bx, bottomY); ctx.stroke();
        drawText(`h=${h.toFixed(2)}m`, bx+18, (by+bottomY)/2, 11, '#ffd93d');
      }
      // Velocity arrow (tangent to circle)
      if (v > 0.3) {
        const tangentX = Math.sin(angle) * angVel * 12;
        const tangentY = Math.cos(angle) * angVel * 12;
        ctx.strokeStyle='#ffd93d'; ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx+tangentX, by+tangentY); ctx.stroke();
      }
      // Skater ball
      drawBall(bx, by, 14, '#ff6b6b');
      drawText(`${m}kg`, bx-10, by+4, 9, '#fff');
      // Ground
      drawGround(bottomY + 8);
      // Info box
      ctx.fillStyle='rgba(15,23,41,0.85)'; ctx.fillRect(10,10,220,55); ctx.strokeStyle='var(--border)'; ctx.strokeRect(10,10,220,55);
      drawText(`v = ${v.toFixed(1)} m/s  |  h = ${h.toFixed(2)} m`, 18, 30, 12);
      drawText(`E_pot = ${Math.round(ep)} J  |  E_kin = ${Math.round(ek)} J`, 18, 50, 12);
      renderBars(ep, ek);
      currentAnimId = requestAnimationFrame(loop);
    }
    simNeedsReset = true;
    loop();

  // ===== COASTER (Level 3) =====
  } else if (type === 'coaster') {
    let t = 0, speed = 1;
    const hills = [
      {x:0,h:350},{x:100,h:80},{x:200,h:340},{x:300,h:140},{x:400,h:300},{x:500,h:180},{x:600,h:280},{x:700,h:220},{x:800,h:350}
    ];
    function getTrackY(px) {
      for (let i=0;i<hills.length-1;i++) {
        if (px >= hills[i].x && px <= hills[i+1].x) {
          const f = (px - hills[i].x)/(hills[i+1].x - hills[i].x);
          const smooth = f*f*(3-2*f);
          return hills[i].h + (hills[i+1].h - hills[i].h)*smooth;
        }
      }
      return 350;
    }
    controls.innerHTML = simControlButtons(`
      <div class="slider-group"><label>Starthöhe: <span id="cH">90</span>%</label>
      <input type="range" min="30" max="100" value="90" id="slCH" oninput="document.getElementById('cH').textContent=this.value"></div>
      <div class="slider-group"><label>Geschwindigkeit: <span id="cS">1.0</span>x</label>
      <input type="range" min="5" max="30" value="10" id="slCS" oninput="document.getElementById('cS').textContent=(this.value/10).toFixed(1)"></div>
    `);
    function loop() {
      checkSimControls();
      if (simNeedsReset) { t=0; simNeedsReset=false; }
      const startH = parseInt(document.getElementById('cH')?.textContent||90);
      speed = parseFloat(document.getElementById('cS')?.textContent||1);
      hills[1].h = 350 - startH*3;
      if (!simPaused) t += speed * 0.8;
      const px = t % 800;
      const py = getTrackY(px);
      const h = (350-py)/350*40;
      const m = 500;
      const ep = m*10*Math.max(0,h);
      const totalE = m*10*((350-hills[1].h)/350*40);
      const ek = Math.max(0, totalE - ep);
      const v = Math.sqrt(2*ek/m);
      cl();
      // Track
      ctx.strokeStyle='#3a5a7a'; ctx.lineWidth=4;
      ctx.beginPath(); ctx.moveTo(0, getTrackY(0));
      for (let x=1;x<=800;x++) ctx.lineTo(x, getTrackY(x));
      ctx.stroke();
      // Track supports
      ctx.strokeStyle='rgba(58,90,122,0.3)'; ctx.lineWidth=1;
      for (let x=50;x<800;x+=50) { ctx.beginPath(); ctx.moveTo(x,getTrackY(x)); ctx.lineTo(x,370); ctx.stroke(); }
      // Cart
      drawBall(px, py-12, 10, '#ff6b6b');
      ctx.fillStyle='#ff6b6b'; ctx.fillRect(px-15, py-8, 30, 8);
      // Height indicator
      if (h > 1) { drawDash(px+20, py, px+20, 350, 'rgba(255,217,61,0.3)'); }
      drawGround(370);
      // Info
      ctx.fillStyle='rgba(15,23,41,0.85)'; ctx.fillRect(10,10,220,55); ctx.strokeStyle='var(--border)'; ctx.strokeRect(10,10,220,55);
      drawText(`h = ${h.toFixed(1)} m  |  v = ${v.toFixed(1)} m/s`, 18, 30, 12);
      drawText(`E_ges = ${Math.round(totalE).toLocaleString()} J`, 18, 50, 12, '#a29bfe');
      renderBars(ep, ek);
      currentAnimId = requestAnimationFrame(loop);
    }
    loop();

  // ===== FREEFALL (Level 4) =====
  } else if (type === 'freefall') {
    let objY = 60, objV = 0, dropping = false, landed = false;
    let ghostTrail = [];
    controls.innerHTML = simControlButtons(`
      <div class="slider-group"><label>Masse: <span id="ffM">2</span> kg</label>
      <input type="range" min="1" max="20" value="2" oninput="document.getElementById('ffM').textContent=this.value"></div>
      <div class="slider-group"><label>Höhe: <span id="ffH">30</span> m</label>
      <input type="range" min="5" max="80" value="30" oninput="document.getElementById('ffH').textContent=this.value"></div>
    `);
    function loop() {
      checkSimControls();
      const m = parseFloat(document.getElementById('ffM')?.textContent||2);
      const H = parseFloat(document.getElementById('ffH')?.textContent||30);
      if (simNeedsReset) { objY=60; objV=0; dropping=false; landed=false; ghostTrail=[]; simNeedsReset=false; }
      if (!simPaused && !dropping && !landed) { dropping=true; objY=60; objV=0; ghostTrail=[]; }
      if (dropping) {
        objV += 10*0.016*3; objY += objV*2;
        ghostTrail.push({y:objY,v:objV});
        if (objY >= 340) { objY=340; dropping=false; landed=true; }
      }
      const frac = Math.min(1, (objY-60)/280);
      const curH = H*(1-frac);
      const curV = Math.sqrt(Math.max(0, 2*10*(H-curH)));
      const ep = m*10*curH, ek = 0.5*m*curV*curV;
      cl();
      drawGround(350);
      // Ruler
      for (let i=0;i<=5;i++) {
        const y=60+280/5*i;
        drawDash(60,y,750,y);
        drawText(`${(H*(1-i/5)).toFixed(0)} m`, 10, y-2, 10, '#5a6e96');
      }
      // Ghost trail
      ghostTrail.forEach((g,i) => {
        if (g.y <= 340) {
          ctx.fillStyle=`rgba(255,107,107,${0.05+i/ghostTrail.length*0.2})`;
          ctx.beginPath(); ctx.arc(400, g.y, 10, 0, Math.PI*2); ctx.fill();
        }
      });
      // Object
      drawBall(400, objY, 16, landed?'#ffd93d':'#ff6b6b');
      // Velocity arrow
      if (dropping && curV > 0.5) {
        const arrowLen = Math.min(curV*3, 80);
        ctx.strokeStyle='#ffd93d'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.moveTo(400,objY+18); ctx.lineTo(400,objY+18+arrowLen); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(400,objY+18+arrowLen); ctx.lineTo(393,objY+10+arrowLen); ctx.moveTo(400,objY+18+arrowLen); ctx.lineTo(407,objY+10+arrowLen); ctx.stroke();
        drawText(`v=${curV.toFixed(1)} m/s`, 415, objY+25+arrowLen/2, 12, '#ffd93d');
      }
      // Splat effect
      if (landed) {
        ctx.fillStyle='rgba(255,217,61,0.15)';
        ctx.beginPath(); ctx.ellipse(400, 345, 30, 8, 0, 0, Math.PI*2); ctx.fill();
        drawText(`Aufprall! v=${Math.sqrt(2*10*H).toFixed(1)} m/s`, 300, 380, 14, '#ffd93d');
      }
      // Info
      ctx.fillStyle='rgba(15,23,41,0.85)'; ctx.fillRect(500,60,200,70); ctx.strokeStyle='var(--border)'; ctx.strokeRect(500,60,200,70);
      drawText(`m = ${m} kg`, 510, 80, 12);
      drawText(`h = ${curH.toFixed(1)} m`, 510, 97, 12);
      drawText(`v = ${curV.toFixed(1)} m/s`, 510, 114, 12);
      renderBars(ep, ek);
      currentAnimId = requestAnimationFrame(loop);
    }
    loop();

  // ===== SPRING (Level 5) =====
  } else if (type === 'spring') {
    let springX = 250, springV = 0, shooting = false, ballX = 0, ballY = 200, ballVx = 0, ballVy = 0, ballFlying = false;
    controls.innerHTML = simControlButtons(`
      <div class="slider-group"><label>Federkonstante D: <span id="spD">400</span> N/m</label>
      <input type="range" min="100" max="1500" value="400" oninput="document.getElementById('spD').textContent=this.value"></div>
      <div class="slider-group"><label>Auslenkung: <span id="spS">15</span> cm</label>
      <input type="range" min="2" max="40" value="15" oninput="document.getElementById('spS').textContent=this.value"></div>
      <div class="slider-group"><label>Masse: <span id="spM">0.5</span> kg</label>
      <input type="range" min="1" max="50" value="5" oninput="document.getElementById('spM').textContent=(this.value/10).toFixed(1)"></div>
    `);
    function loop() {
      checkSimControls();
      const D = parseFloat(document.getElementById('spD')?.textContent||400);
      const s = parseFloat(document.getElementById('spS')?.textContent||15)/100;
      const m = parseFloat(document.getElementById('spM')?.textContent||0.5);
      if (simNeedsReset) { shooting=false; ballFlying=false; springX=250-s*600; ballX=0; ballY=200; ballVx=0; ballVy=0; simNeedsReset=false; }
      if (!simPaused && !shooting && !ballFlying) {
        shooting=true; springX=250-s*600;
      }
      const restX = 250;
      const compX = restX - s*600;
      let esp=0, ek=0, ep=0;
      if (!shooting && !ballFlying) {
        springX = compX;
        esp = 0.5*D*s*s;
      } else if (shooting) {
        const diff = restX - springX;
        const force = D * (diff/600*s > 0 ? diff/600 : 0);
        springX += (restX - springX)*0.15;
        if (Math.abs(springX - restX) < 3) {
          shooting=false; ballFlying=true;
          ballX=restX+30; ballY=200;
          ballVx = s*Math.sqrt(D/m)*3; ballVy=0;
        }
        esp = 0.5*D*Math.pow(Math.max(0,(restX-springX)/600),2);
      }
      if (ballFlying) {
        ballVy += 10*0.03;
        ballX += ballVx*0.5;
        ballY += ballVy;
        ek = 0.5*m*(ballVx*ballVx+ballVy*ballVy)*0.01;
        ep = m*10*Math.max(0,(350-ballY)/350*5);
        if (ballY > 360 || ballX > 820) { ballFlying=false; }
      }
      cl();
      drawGround(360);
      // Wall
      ctx.fillStyle='#5a6e96'; ctx.fillRect(70,140,15,120);
      for(let i=0;i<8;i++){ctx.strokeStyle='#3a4a6a';ctx.beginPath();ctx.moveTo(70,140+i*15);ctx.lineTo(85,155+i*15);ctx.stroke();}
      // Spring
      ctx.strokeStyle='#4ecdc4'; ctx.lineWidth=3; ctx.beginPath();
      const sx = shooting||ballFlying ? springX : compX;
      const coils=15, cw=(sx-85)/coils;
      ctx.moveTo(85,200);
      for(let i=0;i<coils;i++){ctx.lineTo(85+cw*i+cw*0.25,175);ctx.lineTo(85+cw*i+cw*0.75,225);}
      ctx.lineTo(sx,200); ctx.stroke();
      // Block on spring
      if (!ballFlying) {
        ctx.fillStyle='#ff6b6b'; ctx.fillRect(sx, 185, 30, 30);
        drawText(`${m}kg`,sx+3,205,10,'#fff');
      }
      // Flying ball
      if (ballFlying) {
        drawBall(ballX, ballY, 12, '#ff6b6b');
        // trajectory dots
        ctx.fillStyle='rgba(255,107,107,0.2)';
        for(let i=1;i<20;i++){
          const fx=ballX+ballVx*0.5*i;
          const fy=ballY+ballVy*i+0.5*10*0.03*i*i;
          if(fx<820&&fy<370){ctx.beginPath();ctx.arc(fx,fy,2,0,Math.PI*2);ctx.fill();}
        }
      }
      // Info
      const v_launch = s*Math.sqrt(D/m);
      ctx.fillStyle='rgba(15,23,41,0.85)'; ctx.fillRect(450,10,300,70); ctx.strokeStyle='var(--border)'; ctx.strokeRect(450,10,300,70);
      drawText(`E_sp = ½·${D}·${s.toFixed(2)}² = ${(0.5*D*s*s).toFixed(1)} J`, 460, 30, 11);
      drawText(`v_max = √(D·s²/m) = ${v_launch.toFixed(1)} m/s`, 460, 48, 11);
      drawText(`Reichweite ≈ ${(v_launch*v_launch/10).toFixed(1)} m`, 460, 66, 11, '#ffd93d');
      renderBars(ep, ek, esp);
      currentAnimId = requestAnimationFrame(loop);
    }
    canvas.dataset.srst='1';
    loop();

  // ===== BUNGEE (Level 6) =====
  } else if (type === 'bungee') {
    let jumperY = 50, jumperV = 0, jumping = false;
    let trail = [];
    controls.innerHTML = simControlButtons(`
      <div class="slider-group"><label>Masse: <span id="buM">75</span> kg</label>
      <input type="range" min="40" max="120" value="75" oninput="document.getElementById('buM').textContent=this.value"></div>
      <div class="slider-group"><label>Seil D: <span id="buD">100</span> N/m</label>
      <input type="range" min="30" max="300" value="100" oninput="document.getElementById('buD').textContent=this.value"></div>
      <div class="slider-group"><label>Seillänge: <span id="buL">15</span> m</label>
      <input type="range" min="5" max="25" value="15" oninput="document.getElementById('buL').textContent=this.value"></div>
    `);
    function loop() {
      checkSimControls();
      const m = parseFloat(document.getElementById('buM')?.textContent||75);
      const D = parseFloat(document.getElementById('buD')?.textContent||100);
      const ropeL = parseFloat(document.getElementById('buL')?.textContent||15);
      if (simNeedsReset) { jumperY=50; jumperV=0; jumping=false; trail=[]; simNeedsReset=false; }
      if (!simPaused && !jumping) { jumping=true; jumperY=50; jumperV=0; trail=[]; }
      const bridgeY = 40;
      const scale = 8; // pixels per meter
      if (jumping) {
        const dist = (jumperY - bridgeY) / scale; // meters fallen
        let force = m * 10; // gravity
        if (dist > ropeL) {
          const stretch = dist - ropeL;
          force -= D * stretch; // spring force up
        }
        const acc = force / m;
        jumperV += acc * 0.016;
        jumperV *= 0.999;
        jumperY += jumperV * 0.5;
        if (jumperY < bridgeY+5) { jumperY = bridgeY+5; jumperV = Math.abs(jumperV)*0.3; }
        if (jumperY > 390) { jumperY = 390; jumperV = -Math.abs(jumperV)*0.5; }
        trail.push({y:jumperY, t:Date.now()});
        if(trail.length>200) trail.shift();
      }
      const dist = (jumperY - bridgeY)/scale;
      const h = Math.max(0, 45 - dist);
      const v = Math.abs(jumperV)/scale*10;
      const ep = m*10*h;
      const ek = 0.5*m*v*v;
      const stretch = Math.max(0, dist - ropeL);
      const esp = 0.5*D*stretch*stretch;
      cl();
      // Bridge
      ctx.fillStyle='#5a6e96'; ctx.fillRect(0,bridgeY-5,800,12);
      ctx.fillStyle='#3a4a6a';
      ctx.fillRect(150,bridgeY+7,20,360); ctx.fillRect(630,bridgeY+7,20,360);
      // Rope
      const ropeEndY = bridgeY + ropeL*scale;
      ctx.strokeStyle = dist > ropeL ? '#ff6b6b' : '#ffd93d';
      ctx.lineWidth = dist > ropeL ? 3 : 2;
      ctx.beginPath(); ctx.moveTo(400, bridgeY+7); ctx.lineTo(400, Math.min(jumperY-10,jumperY)); ctx.stroke();
      // Rope length marker
      if (dist <= ropeL) { drawDash(420, bridgeY+7, 420, ropeEndY, 'rgba(255,217,61,0.3)'); }
      // Trail
      trail.forEach((p,i) => { ctx.fillStyle=`rgba(162,155,254,${i/trail.length*0.3})`; ctx.beginPath(); ctx.arc(400,p.y,2,0,Math.PI*2); ctx.fill(); });
      // Jumper
      // stick figure
      ctx.strokeStyle='#4ecdc4'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(400,jumperY); ctx.lineTo(400,jumperY+20); ctx.stroke(); // body
      ctx.beginPath(); ctx.moveTo(390,jumperY+8); ctx.lineTo(410,jumperY+8); ctx.stroke(); // arms
      ctx.beginPath(); ctx.moveTo(400,jumperY+20); ctx.lineTo(393,jumperY+30); ctx.moveTo(400,jumperY+20); ctx.lineTo(407,jumperY+30); ctx.stroke(); // legs
      drawBall(400, jumperY-5, 7, '#4ecdc4'); // head
      // Water
      ctx.fillStyle='rgba(78,205,196,0.1)'; ctx.fillRect(0,380,800,20);
      // Info
      ctx.fillStyle='rgba(15,23,41,0.85)'; ctx.fillRect(10,10,200,80); ctx.strokeStyle='var(--border)'; ctx.strokeRect(10,10,200,80);
      drawText(`Höhe: ${h.toFixed(1)} m`, 18, 30, 12);
      drawText(`v: ${v.toFixed(1)} m/s`, 18, 48, 12);
      drawText(`Dehnung: ${stretch.toFixed(1)} m`, 18, 66, 12, stretch>0?'#ff6b6b':'#5a6e96');
      drawText(dist>ropeL?'Seil gespannt!':'Freier Fall', 18, 82, 11, dist>ropeL?'#ff6b6b':'#ffd93d');
      renderBars(ep, ek, esp);
      currentAnimId = requestAnimationFrame(loop);
    }
    loop();

  // ===== BIKE / POWER (Level 7) =====
  } else if (type === 'bike') {
    let bikerX = 80, elapsed = 0, riding = false;
    controls.innerHTML = simControlButtons(`
      <div class="slider-group"><label>Masse: <span id="bkM">80</span> kg</label>
      <input type="range" min="40" max="120" value="80" oninput="document.getElementById('bkM').textContent=this.value"></div>
      <div class="slider-group"><label>Leistung: <span id="bkP">150</span> W</label>
      <input type="range" min="50" max="500" value="150" oninput="document.getElementById('bkP').textContent=this.value"></div>
      <div class="slider-group"><label>Berghöhe: <span id="bkH">30</span> m</label>
      <input type="range" min="10" max="80" value="30" oninput="document.getElementById('bkH').textContent=this.value"></div>
    `);
    function loop() {
      checkSimControls();
      const m = parseFloat(document.getElementById('bkM')?.textContent||80);
      const P = parseFloat(document.getElementById('bkP')?.textContent||150);
      const H = parseFloat(document.getElementById('bkH')?.textContent||30);
      if (simNeedsReset) { bikerX=80; elapsed=0; riding=false; simNeedsReset=false; }
      if (!simPaused && !riding) { riding=true; bikerX=80; elapsed=0; }
      const totalE = m*10*H;
      const totalTime = totalE/P;
      function hillY(x) { return 330 - H*3 * Math.pow(Math.max(0,Math.min(1,(x-80)/600)),0.7); }
      if (riding && bikerX < 680) {
        elapsed += 0.016;
        const progress = Math.min(1, elapsed/totalTime);
        bikerX = 80 + progress*600;
      }
      const curY = hillY(bikerX);
      const curH = (330-curY)/(H*3)*H;
      const ep = m*10*curH;
      const ek = riding && bikerX<680 ? P*0.1 : 0;
      cl();
      // Hill
      ctx.fillStyle='#1a3a2a'; ctx.beginPath(); ctx.moveTo(0,370);
      for(let x=0;x<=800;x+=2) ctx.lineTo(x, hillY(x)+20);
      ctx.lineTo(800,370); ctx.fill();
      ctx.strokeStyle='#2a5a3a'; ctx.lineWidth=3; ctx.beginPath();
      for(let x=0;x<=800;x+=2) { if(x===0)ctx.moveTo(x,hillY(x)+20); else ctx.lineTo(x,hillY(x)+20); }
      ctx.stroke();
      // Road
      ctx.strokeStyle='#5a7a5a'; ctx.lineWidth=2; ctx.setLineDash([10,10]);
      ctx.beginPath(); for(let x=0;x<=800;x+=2){if(x===0)ctx.moveTo(x,hillY(x)+14);else ctx.lineTo(x,hillY(x)+14);} ctx.stroke();
      ctx.setLineDash([]);
      // Biker (simple)
      const bx = bikerX, by = hillY(bikerX)+10;
      // wheels
      ctx.strokeStyle='#e8edf5'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(bx-12,by,8,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(bx+12,by,8,0,Math.PI*2); ctx.stroke();
      // frame
      ctx.strokeStyle='#ff6b6b'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(bx-12,by); ctx.lineTo(bx,by-15); ctx.lineTo(bx+12,by); ctx.lineTo(bx-12,by); ctx.stroke();
      // rider
      ctx.strokeStyle='#4ecdc4'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(bx,by-15); ctx.lineTo(bx-3,by-28); ctx.stroke();
      drawBall(bx-3, by-33, 5, '#4ecdc4');
      // Flag at top
      ctx.fillStyle='#ffd93d'; ctx.fillRect(676, hillY(680)-10, 4, 30);
      ctx.fillStyle='#ffd93d'; ctx.beginPath(); ctx.moveTo(680,hillY(680)-10); ctx.lineTo(700,hillY(680)); ctx.lineTo(680,hillY(680)+10); ctx.fill();
      // Info
      ctx.fillStyle='rgba(15,23,41,0.85)'; ctx.fillRect(10,10,240,90); ctx.strokeStyle='var(--border)'; ctx.strokeRect(10,10,240,90);
      drawText(`P = ${P} W  |  m = ${m} kg  |  H = ${H} m`, 18, 30, 11);
      drawText(`E_pot = m·g·h = ${Math.round(totalE).toLocaleString()} J`, 18, 50, 11);
      drawText(`t = E/P = ${totalTime.toFixed(0)} s = ${(totalTime/60).toFixed(1)} min`, 18, 68, 11, '#ffd93d');
      drawText(`Vergangen: ${elapsed.toFixed(0)} s (${(elapsed/totalTime*100).toFixed(0)}%)`, 18, 86, 11, bikerX>=680?'#00b894':'#e8edf5');
      drawGround(370);
      renderBars(ep, ek);
      currentAnimId = requestAnimationFrame(loop);
    }
    loop();

  // ===== FRICTION (Level 8) =====
  } else if (type === 'friction') {
    let blockX = 100, blockV = 8, ewarm = 0, running = false;
    controls.innerHTML = simControlButtons(`
      <div class="slider-group"><label>Startgeschwindigkeit: <span id="frV">8</span> m/s</label>
      <input type="range" min="2" max="20" value="8" oninput="document.getElementById('frV').textContent=this.value"></div>
      <div class="slider-group"><label>Reibungskoeffizient: <span id="frMu">0.3</span></label>
      <input type="range" min="0" max="10" value="3" oninput="document.getElementById('frMu').textContent=(this.value/10).toFixed(1)"></div>
      <div class="slider-group"><label>Masse: <span id="frM">5</span> kg</label>
      <input type="range" min="1" max="20" value="5" oninput="document.getElementById('frM').textContent=this.value"></div>
    `);
    let heatParticles = [];
    function loop() {
      checkSimControls();
      const v0 = parseFloat(document.getElementById('frV')?.textContent||8);
      const mu = parseFloat(document.getElementById('frMu')?.textContent||0.3);
      const m = parseFloat(document.getElementById('frM')?.textContent||5);
      if (simNeedsReset) { blockX=100; blockV=v0; ewarm=0; running=false; heatParticles=[]; simNeedsReset=false; }
      if (!simPaused && !running) { running=true; blockV=v0; ewarm=0; blockX=100; heatParticles=[]; }
      const totalE = 0.5*m*v0*v0;
      if (running && blockV > 0.01) {
        const friction = mu * m * 10;
        const acc = -friction / m;
        blockV += acc * 0.016;
        if (blockV < 0) blockV = 0;
        blockX += blockV * 3;
        ewarm = totalE - 0.5*m*blockV*blockV;
        // Heat particles
        if (blockV > 0.5 && Math.random()>0.5) {
          heatParticles.push({x:blockX+Math.random()*30-15, y:290+Math.random()*10, life:30, vx:(Math.random()-0.5)*2, vy:-Math.random()*3});
        }
      }
      heatParticles = heatParticles.filter(p => { p.x+=p.vx; p.y+=p.vy; p.life--; return p.life>0; });
      const ek = 0.5*m*blockV*blockV;
      cl();
      // Surface
      ctx.fillStyle='#2a3a4a'; ctx.fillRect(0,300,800,10);
      // Surface texture (roughness indicator)
      ctx.strokeStyle=`rgba(255,107,107,${mu*0.5})`; ctx.lineWidth=1;
      for(let x=0;x<800;x+=6){ctx.beginPath();ctx.moveTo(x,300);ctx.lineTo(x+3,305);ctx.lineTo(x+6,300);ctx.stroke();}
      drawGround(310);
      // Heat particles
      heatParticles.forEach(p => {
        ctx.fillStyle=`rgba(255,${100+p.life*5},50,${p.life/30})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, 2+Math.random(), 0, Math.PI*2); ctx.fill();
      });
      // Block
      ctx.fillStyle=`hsl(${180-ewarm/totalE*180},70%,50%)`; // color shifts from teal to red with heat
      ctx.fillRect(blockX-20, 270, 40, 30);
      drawText(`${m}kg`, blockX-12, 290, 10, '#fff');
      // Velocity arrow
      if (blockV > 0.3) {
        const arrowLen = blockV*6;
        ctx.strokeStyle='#ffd93d'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.moveTo(blockX+22,285); ctx.lineTo(blockX+22+arrowLen,285); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(blockX+22+arrowLen,285); ctx.lineTo(blockX+14+arrowLen,280); ctx.moveTo(blockX+22+arrowLen,285); ctx.lineTo(blockX+14+arrowLen,290); ctx.stroke();
      }
      // Friction force arrow
      if (running && blockV > 0.1) {
        ctx.strokeStyle='#ff6b6b'; ctx.lineWidth=2;
        const fLen = mu*20;
        ctx.beginPath(); ctx.moveTo(blockX-22,285); ctx.lineTo(blockX-22-fLen,285); ctx.stroke();
        drawText('F_R', blockX-28-fLen, 282, 10, '#ff6b6b');
      }
      // Thermometer
      const thermoH = (ewarm/Math.max(totalE,1))*120;
      ctx.fillStyle='#1a2540'; ctx.fillRect(730,130,25,140); ctx.strokeStyle='#3a5a7a'; ctx.strokeRect(730,130,25,140);
      ctx.fillStyle='#ff6b6b'; ctx.fillRect(732,270-thermoH,21,thermoH);
      drawText('🌡️', 732, 125, 16);
      drawText(`${(ewarm).toFixed(0)}J`, 725, 285, 10, '#ff6b6b');
      // Info
      ctx.fillStyle='rgba(15,23,41,0.85)'; ctx.fillRect(10,10,260,75); ctx.strokeStyle='var(--border)'; ctx.strokeRect(10,10,260,75);
      drawText(`v = ${blockV.toFixed(2)} m/s  |  μ = ${mu.toFixed(1)}`, 18, 30, 12);
      drawText(`E_kin = ${ek.toFixed(0)} J  |  E_wärme = ${ewarm.toFixed(0)} J`, 18, 50, 12);
      const eta = totalE>0 ? ((ek/totalE)*100).toFixed(0) : 0;
      drawText(`η = ${eta}%  |  Strecke = ${((blockX-100)/3).toFixed(1)} m`, 18, 68, 12, '#ffd93d');
      renderBars(0, ek, undefined, ewarm);
      currentAnimId = requestAnimationFrame(loop);
    }
    loop();

  // ===== GENERIC (Level 9, 10 - Energy Chain) =====
  } else {
    let t = 0;
    const stages = ['☀️ Sonne','🌿 Pflanze','🍎 Nahrung','💪 Muskel','🚴 Bewegung','⚡ Generator','💡 Licht'];
    let activeStage = 0;
    controls.innerHTML = simControlButtons();
    function loop() {
      checkSimControls();
      if (simNeedsReset) { t=0; activeStage=0; simNeedsReset=false; }
      if (!simPaused) { t+=0.02; activeStage = Math.floor(t*0.7) % stages.length; }
      cl();
      const stageW = 800/stages.length;
      stages.forEach((s,i) => {
        const x = i*stageW+stageW/2;
        const y = 180;
        const active = i<=activeStage;
        // Node
        ctx.fillStyle = active ? 'rgba(78,205,196,0.15)' : 'rgba(30,45,77,0.5)';
        ctx.beginPath(); ctx.arc(x, y, 35, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = active ? (i===activeStage?'#ffd93d':'#4ecdc4') : '#2a3a5a';
        ctx.lineWidth = i===activeStage?3:2;
        ctx.beginPath(); ctx.arc(x, y, 35, 0, Math.PI*2); ctx.stroke();
        // Pulse on active
        if (i===activeStage) {
          const pulse = Math.sin(t*5)*5+40;
          ctx.strokeStyle='rgba(255,217,61,0.3)'; ctx.lineWidth=2;
          ctx.beginPath(); ctx.arc(x,y,pulse,0,Math.PI*2); ctx.stroke();
        }
        // Emoji
        ctx.font='24px serif'; ctx.textAlign='center'; ctx.fillText(s.split(' ')[0],x,y+8);
        ctx.font='10px Nunito'; ctx.fillStyle=active?'#e8edf5':'#5a6e96'; ctx.fillText(s.split(' ')[1],x,y+50);
        ctx.textAlign='left';
        // Arrow
        if (i<stages.length-1) {
          const ax=x+40, ax2=(i+1)*stageW+stageW/2-40;
          ctx.strokeStyle = i<activeStage?'#4ecdc4':'#2a3a5a'; ctx.lineWidth=2;
          ctx.beginPath(); ctx.moveTo(ax,y); ctx.lineTo(ax2,y); ctx.stroke();
          // Traveling dot
          if (i<activeStage) {
            const dotT = (t*3+i)%1;
            const dx=ax+(ax2-ax)*dotT;
            ctx.fillStyle='#ffd93d'; ctx.beginPath(); ctx.arc(dx,y,4,0,Math.PI*2); ctx.fill();
          }
          // arrowhead
          ctx.beginPath(); ctx.moveTo(ax2,y); ctx.lineTo(ax2-8,y-5); ctx.moveTo(ax2,y); ctx.lineTo(ax2-8,y+5); ctx.stroke();
        }
      });
      // Energy loss indicators
      const lossY = 280;
      drawText('Energieumwandlungskette', 250, 30, 16, '#4ecdc4');
      drawText('Bei jeder Stufe geht etwas Energie als Wärme verloren (2. Hauptsatz)', 150, 320, 12, '#ff6b6b');
      // Efficiency bars below
      const efficiencies = [100, 2, 0.5, 25, 90, 85, 15]; // rough real %
      stages.forEach((s,i) => {
        const x = i*stageW+10;
        const w = stageW-20;
        const eff = efficiencies[i];
        const active = i<=activeStage;
        ctx.fillStyle = active?'rgba(78,205,196,0.2)':'rgba(30,45,77,0.3)';
        ctx.fillRect(x, 350, w, 20);
        ctx.fillStyle = active?'#4ecdc4':'#2a3a5a';
        ctx.fillRect(x, 350, w*eff/100, 20);
        ctx.fillStyle='#e8edf5'; ctx.font='9px Nunito'; ctx.fillText(`${eff}%`, x+2, 365);
      });
      drawText('Wirkungsgrad je Stufe:', 10, 345, 10, '#8a9bc0');
      renderBars(50-activeStage*5, activeStage*7, undefined, activeStage*3);
      currentAnimId = requestAnimationFrame(loop);
    }
    loop();
  }
}

// Global animation frame tracker
let currentAnimId = null;

function endSimulation() {
  if (currentAnimId) cancelAnimationFrame(currentAnimId);
  currentAnimId = null;
  simQIdx = 0;
  simQCorrect = 0;
  showSimQuestions();
}

// ============================================================
// SIMULATION COMPREHENSION QUESTIONS
// ============================================================
let simQIdx = 0;
let simQCorrect = 0;

function showSimQuestions() {
  const sq = currentLevelData.simQuestions || [];
  if (sq.length === 0 || simQIdx >= sq.length) { renderTask(); return; }
  const el = document.getElementById('screen-game');
  showScreen('game');
  if (teacherMode) updateTeacherPanel();
  const q = sq[simQIdx];
  el.innerHTML = `
    <div class="card">
      <div class="flex justify-between items-center">
        <h3>🔬 Frage zur Simulation</h3>
        <span class="text-xs text-muted">${simQIdx + 1} / ${sq.length}</span>
      </div>
      <div class="progress-bar mt-1"><div class="progress-fill" style="width:${(simQIdx/sq.length)*100}%"></div></div>
    </div>
    <div class="card">
      ${avatarBubble(simQIdx === 0 ? 'Du hast die Simulation ausprobiert. Jetzt prüfe ich, ob du verstanden hast, was dort passiert ist!' : 'Nächste Frage zur Simulation:', 'think')}
      <p class="fw-bold mt-2">${q.q}</p>
      <div class="mt-1" id="simQOptions">
        ${q.options.map((o, i) => `<button class="option-btn" onclick="answerSimQ(${i})">${o}</button>`).join('')}
      </div>
    </div>
    <div id="simQFeedback"></div>
    ${teacherMode ? `<div class="mt-1"><button class="btn btn-secondary btn-small" style="border-color:#e17055;color:#e17055;" onclick="simQIdx=${sq.length};showSimQuestions()">🎓 Überspringen →</button></div>` : ''}
  `;
}

function answerSimQ(idx) {
  const sq = currentLevelData.simQuestions;
  const q = sq[simQIdx];
  const correct = idx === q.correct;
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((b, i) => { b.disabled = true; if (i === q.correct) b.classList.add('correct'); if (i === idx && !correct) b.classList.add('incorrect'); });
  if (correct) { simQCorrect++; addXP(q.xp || 10, 'Simulationsfrage'); }
  S.answers.push({ level: currentLevelData.id, task: 'sim-' + simQIdx, question: q.q, correct, attempts: 1, hints: 0, xp: correct ? (q.xp || 10) : 0, explain: q.explain, timestamp: Date.now() });
  saveState();
  const fb = document.getElementById('simQFeedback');
  fb.innerHTML = `
    <div class="card" style="border-color:${correct ? 'var(--success)' : 'var(--danger)'};">
      ${avatarBubble(correct ? getCorrectPhrase() : getIncorrectPhrase(), correct ? 'cheer' : 'sad')}
      ${correct ? `<p class="text-accent fw-bold" style="text-align:center;">+${q.xp||10} XP ⚡</p>` : `<p class="text-sm fw-bold mt-1" style="color:var(--success);">✅ Richtig wäre: ${q.options[q.correct]}</p>`}
      <div class="help-panel mt-1"><h4>📖 Erklärung</h4><p class="text-sm">${q.explain}</p></div>
      <button class="btn btn-primary btn-block mt-2" onclick="simQIdx++;showSimQuestions()">Weiter →</button>
    </div>
  `;
}

// ============================================================
// FINISH LEVEL
// ============================================================
function finishLevel(lvlId) {
  const ls = S.levels[lvlId];
  const score = currentTasks.length > 0 ? Math.round((currentCorrect / currentTasks.length) * 100) : 0;
  ls.score = Math.max(ls.score, score);
  ls.timeSpent = Date.now() - levelStartTime;

  const el = document.getElementById('screen-game');

  if (score >= 80) {
    ls.completed = true;
    if (lvlId < 10) {
      S.levels[lvlId + 1].unlocked = true;
      S.currentLevel = Math.max(S.currentLevel, lvlId + 1);
    }
    addXP(50, 'Level abgeschlossen!');
  }

  checkBadges();
  saveState();

  const minutes = Math.floor(ls.timeSpent / 60000);
  const seconds = Math.floor((ls.timeSpent % 60000) / 1000);

  el.innerHTML = `
    <div class="card card-glow text-center">
      <div style="font-size:3rem;">${score >= 80 ? '🎉' : score >= 60 ? '📊' : '💪'}</div>
      <h1>${score >= 80 ? 'Level geschafft!' : score >= 60 ? 'Fast geschafft!' : 'Übe weiter!'}</h1>
      <div class="stat-grid mt-2">
        <div class="stat-card">
          <div class="stat-value ${score >= 80 ? 'text-success' : score >= 60 ? 'text-warning' : 'text-danger'}">${score}%</div>
          <div class="stat-label">Ergebnis</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${currentCorrect}/${currentTasks.length}</div>
          <div class="stat-label">Richtig</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${minutes}:${seconds.toString().padStart(2, '0')}</div>
          <div class="stat-label">Zeit</div>
        </div>
      </div>
    </div>

    <div class="card">
      ${avatarBubble(
        score >= 80 ? getCorrectPhrase() + ' Du hast ' + score + '% erreicht und das Level gemeistert!' :
        score >= 60 ? 'Gutes Ergebnis mit ' + score + '%! Du kannst das Level wiederholen, um dein Wissen zu festigen, oder weitermachen – du entscheidest!' :
        getIncorrectPhrase() + ' Du hast ' + score + '% erreicht. Wiederhole das Level – beim nächsten Mal klappt es besser!',
        score >= 80 ? 'cheer' : score >= 60 ? 'happy' : 'tip'
      )}
    </div>

    <div class="card">
      <h3>📝 Lerntagebuch</h3>
      <p class="text-sm text-muted">Schreibe kurz auf, was du gelernt hast. Das hilft dir, das Gelernte besser zu behalten! Dein Eintrag wird automatisch gespeichert, auch wenn du auf „Weiter" klickst.</p>
      <textarea id="journalEntry" placeholder="Was hast du in diesem Level gelernt? Was war schwierig? Was hat dich überrascht?" class="mt-1"></textarea>
      <button class="btn btn-secondary btn-small mt-1" onclick="saveJournalEntry(${lvlId})">💾 Jetzt speichern</button>
      <p class="text-xs text-muted mt-1">💡 Tipp: Alle deine Einträge findest du jederzeit unter 📓 Tagebuch in der Navigation oben.</p>
    </div>

    <div class="card text-center">
      <div class="flex gap-sm" style="justify-content:center;flex-wrap:wrap;">
        <button class="btn btn-secondary" onclick="startLevel(${lvlId})">🔄 Wiederholen</button>
        ${score >= 60 && lvlId < 10 ? `<button class="btn btn-primary" onclick="startLevel(${lvlId + 1})">Weiter →</button>` : ''}
        <button class="btn btn-secondary" onclick="showScreen('dashboard')">📊 Dashboard</button>
      </div>
    </div>
  `;
}

function saveJournalEntry(lvlId) {
  const input = document.getElementById('journalEntry');
  if (input.value.trim().length > 0) {
    S.journal.push({
      date: new Date().toISOString(),
      level: lvlId,
      text: input.value.trim()
    });
    saveState();
    showNotification('📝 Tagebucheintrag gespeichert!', '');
    input.value = '';
    checkBadges();
  }
}

        <button class="btn btn-secondary btn-small ${S.settings.fontSize === 'medium' ? 'btn-primary' : ''}" onclick="setFontSize('medium')">Mittel</button>

      ${teacherMode 
        ? '<button class="btn btn-secondary mt-1" onclick="deactivateTeacher()">🔒 Lehrer-Modus deaktivieren</button>'

}

function changeAvatar(btn) {
  document.querySelectorAll('#screen-settings .avatar-option').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  S.avatar = btn.dataset.avatar;
  const a = AVATARS.find(a => a.icon === S.avatar);
  if (a) {
    document.getElementById('settingsAvatarPreview').innerHTML = `
      <p class="fw-bold text-accent">${a.icon} ${a.name}</p>
      <p class="text-sm text-muted">${a.desc}</p>
    `;
  }
  saveState();
  showNotification(`Avatar geändert: ${a ? a.name : ''} ${S.avatar}`, '');
}

function setFontSize(size) {
  S.settings.fontSize = size;
  document.body.classList.remove('font-small', 'font-large');
  if (size === 'small') document.body.classList.add('font-small');
  if (size === 'large') document.body.classList.add('font-large');
  saveState();
  renderSettings();
}

function generatePassword() {
  const pw = stateToPassword();
  const display = document.getElementById('passwordDisplay');
  display.innerHTML = `
    <div class="formula" style="word-break:break-all;font-size:0.7rem;max-height:120px;overflow-y:auto;">
      ${pw}
    </div>
    <button class="btn btn-secondary btn-small mt-1" onclick="copyPassword()">📋 Kopieren</button>
  `;
}

function copyPassword() {
  const pw = stateToPassword();
  navigator.clipboard.writeText(pw).then(() => {
    showNotification('✅ Passwort kopiert!', '');
  }).catch(() => {
    showNotification('Kopieren fehlgeschlagen – bitte manuell kopieren.', '');
  });
}

function loadPassword() {
  const input = document.getElementById('loadPasswordInput');
  const result = document.getElementById('loadResult');
  if (passwordToState(input.value)) {
    result.innerHTML = '<p class="text-success fw-bold">✅ Fortschritt erfolgreich geladen!</p>';
    applySettings();
    showScreen('dashboard');
  } else {
    result.innerHTML = '<p class="text-danger fw-bold">❌ Ungültiges Passwort. Bitte überprüfe die Eingabe.</p>';
  }
}

function confirmReset() {
  showModal(`
    <h2 class="text-danger">⚠️ Wirklich zurücksetzen?</h2>
    <p class="mt-1">Dein gesamter Fortschritt wird gelöscht. Diese Aktion kann nicht rückgängig gemacht werden.</p>
    <div class="flex gap-sm mt-2">
      <button class="btn btn-danger" onclick="doReset()">Ja, zurücksetzen</button>
      <button class="btn btn-secondary" onclick="closeModal()">Abbrechen</button>
    </div>
  `);
}

function doReset() {
  localStorage.removeItem('energielab_state');
  S = JSON.parse(JSON.stringify(DEFAULT_STATE));
  for (let i = 0; i <= 10; i++) initLevelState(i);
  closeModal();
  document.getElementById('mainNav').style.display = 'none';
  renderOnboarding();
  showScreen('onboarding');
}

// PDF EXPORT
// ============================================================
function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  let y = 20;

  // Helper
  function checkPage(needed) { if (y > 280 - (needed||0)) { doc.addPage(); y = 20; } }
  function heading(text, size) { checkPage(15); doc.setFont('helvetica','bold'); doc.setFontSize(size||14); doc.text(text,20,y); y+=size?size*0.6:9; }
  function line(text, indent) { checkPage(6); doc.setFont('helvetica','normal'); doc.setFontSize(10); const lines=doc.splitTextToSize(text,170-(indent||0)); doc.text(lines,(indent||0)+20,y); y+=lines.length*4.5+1; }
  function colorLine(text,color,bold) { checkPage(6); doc.setFont('helvetica',bold?'bold':'normal'); doc.setFontSize(10); doc.setTextColor(...color); const lines=doc.splitTextToSize(text,170); doc.text(lines,20,y); y+=lines.length*4.5+1; doc.setTextColor(0,0,0); }
  function separator() { checkPage(8); doc.setDrawColor(200,200,200); doc.line(20,y,190,y); y+=5; }

  // HEADER
  doc.setFont('helvetica','bold'); doc.setFontSize(22);
  doc.text('EnergieLab', 20, y); y += 6;
  doc.setFontSize(12); doc.setFont('helvetica','normal');
  doc.text('Fortschrittsbericht & Lerndiagnose', 20, y); y += 10;

  const name = S.name || 'Anonym';
  line(`Schüler/in: ${name}`);
  line(`Datum: ${new Date().toLocaleDateString('de-DE', {day:'2-digit',month:'long',year:'numeric'})}`);
  line(`Gesamte XP: ${S.xp}`);
  const completed = Object.values(S.levels).filter(l=>l.completed).length;
  line(`Level abgeschlossen: ${completed}/11 (${Math.round(completed/11*100)}%)`);
  line(`Badges: ${S.badges.length}/${BADGE_DEFS.length}`);
  separator();

  // OVERVIEW TABLE
  heading('Übersicht aller Level');
  LEVELS.forEach(l => {
    const ls = S.levels[l.id];
    const status = ls.completed ? `${ls.score}%` : (ls.unlocked ? 'Offen' : 'Gesperrt');
    const icon = ls.completed ? (ls.score >= 80 ? '✓' : '△') : '○';
    line(`${icon} Level ${l.id}: ${l.title} — ${status}`);
  });
  separator();

  // PER-LEVEL DIAGNOSIS
  heading('Detaillierte Lerndiagnose pro Thema', 16);
  y += 3;

  LEVELS.forEach(l => {
    const ls = S.levels[l.id];
    const levelAnswers = S.answers.filter(a => a.level === l.id);
    if (levelAnswers.length === 0) return; // Skip levels not attempted

    checkPage(40);
    heading(`Level ${l.id}: ${l.title}`, 13);

    const correctCount = levelAnswers.filter(a => a.correct).length;
    const totalCount = levelAnswers.length;
    const pct = totalCount > 0 ? Math.round(correctCount/totalCount*100) : 0;

    if (pct >= 80) {
      colorLine(`Ergebnis: ${correctCount}/${totalCount} richtig (${pct}%) — Sehr gut!`, [0,150,100], true);
    } else if (pct >= 60) {
      colorLine(`Ergebnis: ${correctCount}/${totalCount} richtig (${pct}%) — Teilweise verstanden`, [200,150,0], true);
    } else {
      colorLine(`Ergebnis: ${correctCount}/${totalCount} richtig (${pct}%) — Übungsbedarf`, [200,50,50], true);
    }

    // Find wrong answers for this level
    const wrongAnswers = levelAnswers.filter(a => !a.correct);
    if (wrongAnswers.length > 0) {
      y += 2;
      doc.setFont('helvetica','bold'); doc.setFontSize(10);
      doc.setTextColor(200,50,50);
      doc.text('Problembereiche:', 20, y); y += 5;
      doc.setTextColor(0,0,0);

      wrongAnswers.forEach(wa => {
        checkPage(20);
        // Question
        doc.setFont('helvetica','bold'); doc.setFontSize(9);
        const qLines = doc.splitTextToSize(`✗ ${wa.question || 'Aufgabe ' + (wa.task+1)}`, 165);
        doc.text(qLines, 25, y); y += qLines.length * 4 + 1;

        // Explanation what they need to practice
        if (wa.explain) {
          doc.setFont('helvetica','normal'); doc.setFontSize(8);
          doc.setTextColor(100,100,100);
          const eLines = doc.splitTextToSize(`→ ${wa.explain}`, 160);
          doc.text(eLines, 28, y); y += eLines.length * 3.5 + 2;
          doc.setTextColor(0,0,0);
        }
      });
    }

    // Correct answers summary
    const rightAnswers = levelAnswers.filter(a => a.correct);
    if (rightAnswers.length > 0) {
      y += 1;
      doc.setFont('helvetica','normal'); doc.setFontSize(9);
      doc.setTextColor(0,130,90);
      doc.text(`✓ ${rightAnswers.length} Aufgabe${rightAnswers.length>1?'n':''} korrekt beantwortet`, 25, y); y += 5;
      doc.setTextColor(0,0,0);
    }

    // Recommendation
    if (pct < 80 && wrongAnswers.length > 0) {
      checkPage(12);
      doc.setFont('helvetica','italic'); doc.setFontSize(9);
      doc.setTextColor(50,80,150);
      const concepts = [...new Set(wrongAnswers.map(wa => {
        // Extract key concept from the question
        const q = (wa.question||'').toLowerCase();
        if (q.includes('lageenergie') || q.includes('höhe') || q.includes('e_pot') || q.includes('m · g · h')) return 'Lageenergie (E=m·g·h)';
        if (q.includes('kinetisch') || q.includes('geschwindigkeit') || q.includes('v²') || q.includes('e_kin')) return 'Kinetische Energie (E=½mv²)';
        if (q.includes('spannenergie') || q.includes('feder') || q.includes('d · s')) return 'Spannenergie (E=½Ds²)';
        if (q.includes('leistung') || q.includes('watt') || q.includes('p =')) return 'Leistung (P=E/t)';
        if (q.includes('reibung') || q.includes('wirkungsgrad') || q.includes('verlust')) return 'Reibung & Wirkungsgrad';
        if (q.includes('erhaltung') || q.includes('umwandlung') || q.includes('gesamt')) return 'Energieerhaltung';
        if (q.includes('einheit') || q.includes('joule') || q.includes('formel')) return 'Grundlagen & Formeln';
        return 'Allgemeines Verständnis';
      }))];
      const recLines = doc.splitTextToSize(`Empfehlung: Folgende Konzepte wiederholen: ${concepts.join(', ')}`, 165);
      doc.text(recLines, 25, y); y += recLines.length * 4 + 2;
      doc.setTextColor(0,0,0);
    }

    separator();
  });

  // GLOBAL DIAGNOSIS SUMMARY
  checkPage(50);
  heading('Gesamtdiagnose', 16);
  
  const allWrong = S.answers.filter(a => !a.correct);
  const allCorrect = S.answers.filter(a => a.correct);
  const totalPct = S.answers.length > 0 ? Math.round(allCorrect.length/S.answers.length*100) : 0;

  line(`Insgesamt ${S.answers.length} Aufgaben bearbeitet: ${allCorrect.length} richtig, ${allWrong.length} falsch (${totalPct}%)`);
  y += 3;

  if (allWrong.length > 0) {
    heading('Konzepte mit Übungsbedarf:', 11);
    // Categorize all wrong answers
    const problemMap = {};
    allWrong.forEach(wa => {
      const q = (wa.question||'').toLowerCase();
      let cat = 'Sonstiges';
      if (q.includes('lageenergie') || q.includes('höhe') || q.includes('e_pot') || q.includes('m · g · h') || q.includes('heben') || q.includes('aufzug')) cat = 'Lageenergie';
      else if (q.includes('kinetisch') || q.includes('geschwindigkeit') || q.includes('v²') || q.includes('e_kin') || q.includes('beweg') || q.includes('fall')) cat = 'Kinetische Energie';
      else if (q.includes('spannenergie') || q.includes('feder') || q.includes('trampolin') || q.includes('d · s') || q.includes('elastisch')) cat = 'Spannenergie';
      else if (q.includes('leistung') || q.includes('watt') || q.includes('p =') || q.includes('motor')) cat = 'Leistung';
      else if (q.includes('reibung') || q.includes('wirkungsgrad') || q.includes('verlust') || q.includes('wärme') || q.includes('bremse')) cat = 'Reibung & Wirkungsgrad';
      else if (q.includes('erhaltung') || q.includes('umwandlung') || q.includes('gesamt') || q.includes('perpetuum')) cat = 'Energieerhaltung & Umwandlung';
      else if (q.includes('einheit') || q.includes('joule') || q.includes('formel') || q.includes('beschreibt')) cat = 'Grundlagen & Formeln';
      if (!problemMap[cat]) problemMap[cat] = 0;
      problemMap[cat]++;
    });

    const sorted = Object.entries(problemMap).sort((a,b) => b[1]-a[1]);
    sorted.forEach(([cat, count]) => {
      const bar = '■'.repeat(Math.min(count, 15));
      colorLine(`${cat}: ${count} Fehler ${bar}`, count >= 3 ? [200,50,50] : [200,150,0]);
    });

    y += 3;
    heading('Empfehlungen:', 11);
    sorted.forEach(([cat, count]) => {
      checkPage(8);
      if (cat === 'Lageenergie') line('→ Formel E=m·g·h üben. Zusammenhang Masse, Höhe und Energie verstehen.', 5);
      else if (cat === 'Kinetische Energie') line('→ Formel E=½mv² üben. Besonders: v wird quadriert! Doppelte Geschwindigkeit = 4x Energie.', 5);
      else if (cat === 'Spannenergie') line('→ Formel E=½Ds² üben. Federkonstante und Auslenkung verstehen.', 5);
      else if (cat === 'Leistung') line('→ P=E/t üben. Unterschied Energie vs. Leistung. Zeitumrechnung (min→s) beachten.', 5);
      else if (cat === 'Reibung & Wirkungsgrad') line('→ Konzept Wirkungsgrad (η=E_nutz/E_zugeführt) üben. Reibung = Umwandlung in Wärme.', 5);
      else if (cat === 'Energieerhaltung & Umwandlung') line('→ Energieerhaltungssatz wiederholen. Energie kann nur umgewandelt werden!', 5);
      else if (cat === 'Grundlagen & Formeln') line('→ Einheiten (Joule, Watt) und Grundformeln wiederholen.', 5);
      else line(`→ Konzept "${cat}" gezielt wiederholen.`, 5);
    });
  } else if (S.answers.length > 0) {
    colorLine('Keine Problembereiche erkannt – hervorragende Leistung!', [0,150,100], true);
  }

  separator();

  // JOURNAL
  if (S.journal.length > 0) {
    checkPage(20);
    heading('Lerntagebuch');
    doc.setFontSize(9); doc.setFont('helvetica','normal');
    S.journal.forEach(e => {
      checkPage(12);
      const date = new Date(e.date).toLocaleDateString('de-DE');
      const lines = doc.splitTextToSize(`${date}: ${e.text}`, 170);
      doc.text(lines, 20, y);
      y += lines.length * 4 + 3;
    });
    separator();
  }

  // PASSWORD
  checkPage(20);
  heading('Wiederherstellungs-Passwort', 10);
  doc.setFont('courier','normal'); doc.setFontSize(5);
  const pw = stateToPassword();
  const pwLines = doc.splitTextToSize(pw, 170);
  doc.text(pwLines.slice(0, 8), 20, y);

  doc.save(`EnergieLab_${name.replace(/\s/g,'_')}_${new Date().toISOString().slice(0,10)}.pdf`);
  showNotification('📄 PDF wurde erstellt!', '');
}
