<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EnergieLab">
<meta name="theme-color" content="#0f1729">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<title>EnergieLab – Mechanische Energie entdecken</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" as="style">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --font-size-base: 16px;
  --bg-primary: #0f1729;
  --bg-secondary: #1a2540;
  --bg-card: #1e2d4d;
  --bg-card-hover: #243558;
  --text-primary: #e8edf5;
  --text-secondary: #8a9bc0;
  --text-muted: #5a6e96;
  --accent: #4ecdc4;
  --accent-glow: rgba(78, 205, 196, 0.3);
  --accent2: #ff6b6b;
  --accent3: #ffd93d;
  --accent4: #6c5ce7;
  --accent5: #a29bfe;
  --success: #00b894;
  --warning: #fdcb6e;
  --danger: #e17055;
  --border: rgba(78, 205, 196, 0.15);
  --radius: 12px;
  --radius-lg: 20px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --shadow-glow: 0 0 30px rgba(78, 205, 196, 0.15);
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html {
  font-size: var(--font-size-base);
  scroll-behavior: smooth;
  -webkit-text-size-adjust: 100%;
  height: -webkit-fill-available;
}

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  min-height: -webkit-fill-available;
  line-height: 1.6;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: none;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: 
    radial-gradient(ellipse at 20% 20%, rgba(78, 205, 196, 0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(108, 92, 231, 0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(255, 107, 107, 0.03) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.app-container {
  max-width: 900px;
  margin: 0 auto;
  padding: 1rem;
  position: relative;
  z-index: 1;
}

/* NAV */
.nav-bar {
  display: flex;
  gap: 0.25rem;
  background: var(--bg-secondary);
  border-radius: var(--radius);
  padding: 0.35rem;
  margin-bottom: 1.5rem;
  border: 1px solid var(--border);
  position: sticky;
  top: 0.5rem;
  z-index: 100;
  backdrop-filter: blur(16px);
  flex-wrap: wrap;
}

.nav-btn {
  flex: 1;
  min-width: 60px;
  padding: 0.6rem 0.5rem;
  min-height: 44px;
  border: none;
  border-radius: 8px;
  background: transparent;
  color: var(--text-secondary);
  font-family: inherit;
  font-size: 0.8rem;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.2rem;
  touch-action: manipulation;
  -webkit-user-select: none;
  user-select: none;
}

.nav-btn:hover { background: var(--bg-card); color: var(--text-primary); }
.nav-btn.active { background: var(--accent); color: var(--bg-primary); }
.nav-btn .nav-icon { font-size: 1.2rem; }

/* CARDS */
.card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 1.5rem;
  margin-bottom: 1rem;
  border: 1px solid var(--border);
  transition: var(--transition);
  animation: fadeIn 0.4s ease;
}

.card:hover { border-color: rgba(78, 205, 196, 0.3); }

.card-glow {
  box-shadow: var(--shadow-glow);
  border-color: var(--accent);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse { 
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

h1, h2, h3 {
  font-weight: 800;
  line-height: 1.3;
}

h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
h2 { font-size: 1.4rem; margin-bottom: 0.5rem; color: var(--accent); }
h3 { font-size: 1.1rem; margin-bottom: 0.4rem; }

p { margin-bottom: 0.5rem; }

/* BUTTONS */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.75rem 1.5rem;
  min-height: 44px;
  border: none;
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition);
  text-decoration: none;
  touch-action: manipulation;
  -webkit-user-select: none;
  user-select: none;
}

.btn-primary {
  background: var(--accent);
  color: var(--bg-primary);
}
.btn-primary:hover {
  background: #5de0d8;
  box-shadow: 0 0 20px var(--accent-glow);
  transform: translateY(-2px);
}

.btn-secondary {
  background: var(--bg-secondary);
  color: var(--text-primary);
  border: 1px solid var(--border);
}
.btn-secondary:hover {
  background: var(--bg-card);
  border-color: var(--accent);
}

.btn-danger {
  background: var(--danger);
  color: #fff;
}

.btn-small {
  padding: 0.4rem 0.8rem;
  font-size: 0.8rem;
}

.btn-block { width: 100%; justify-content: center; }

.btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none !important;
}

/* INPUTS */
input[type="text"], input[type="number"], textarea, select {
  width: 100%;
  padding: 0.75rem 1rem;
  min-height: 44px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 16px;
  transition: var(--transition);
  -webkit-appearance: none;
  appearance: none;
}

input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

textarea { resize: vertical; min-height: 80px; }

/* PROGRESS */
.progress-bar {
  width: 100%;
  height: 10px;
  background: var(--bg-secondary);
  border-radius: 5px;
  overflow: hidden;
  margin: 0.5rem 0;
}

.progress-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.6s ease;
  background: linear-gradient(90deg, var(--accent), var(--accent5));
}

/* XP */
.xp-display {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.3rem 0.8rem;
  background: linear-gradient(135deg, rgba(78,205,196,0.15), rgba(162,155,254,0.15));
  border-radius: 20px;
  font-weight: 700;
  font-size: 0.9rem;
  color: var(--accent);
}

.xp-pop {
  animation: pulse 0.4s ease;
}

/* BADGES */
.badge-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 0.75rem;
}

.badge-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1rem 0.5rem;
  background: var(--bg-secondary);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  text-align: center;
  transition: var(--transition);
}

.badge-item.earned {
  border-color: var(--accent3);
  background: linear-gradient(135deg, rgba(255,217,61,0.1), rgba(78,205,196,0.1));
}

.badge-item.locked { opacity: 0.4; }
.badge-icon { font-size: 2rem; margin-bottom: 0.3rem; }
.badge-name { font-size: 0.75rem; font-weight: 700; }

/* LEVEL GRID */
.level-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 0.75rem;
}

.level-card {
  padding: 1rem;
  background: var(--bg-secondary);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: var(--transition);
  text-align: center;
}

.level-card:hover:not(.locked) {
  transform: translateY(-3px);
  border-color: var(--accent);
  box-shadow: var(--shadow-glow);
}

.level-card.locked { opacity: 0.35; cursor: not-allowed; }
.level-card.completed { border-color: var(--success); }
.level-card.current { border-color: var(--accent); box-shadow: var(--shadow-glow); }
.level-num { font-size: 1.8rem; font-weight: 900; }
.level-title { font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); margin-top: 0.25rem; }

/* QUIZ */
.option-btn {
  display: block;
  width: 100%;
  padding: 0.85rem 1rem;
  min-height: 48px;
  margin-bottom: 0.5rem;
  background: var(--bg-secondary);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  text-align: left;
  touch-action: manipulation;
  -webkit-user-select: none;
  user-select: none;
}

.option-btn:hover:not(:disabled) {
  border-color: var(--accent);
  background: var(--bg-card);
}

.option-btn.correct {
  border-color: var(--success);
  background: rgba(0, 184, 148, 0.15);
}

.option-btn.incorrect {
  border-color: var(--danger);
  background: rgba(225, 112, 85, 0.15);
}

.option-btn:disabled { cursor: default; }

/* SIMULATION */
.sim-container {
  background: var(--bg-secondary);
  border-radius: var(--radius);
  padding: 1rem;
  margin: 1rem 0;
  border: 1px solid var(--border);
}

.sim-canvas-wrap {
  position: relative;
  width: 100%;
  background: #0a0f1e;
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 0.75rem;
  touch-action: none;
}

.sim-canvas-wrap canvas {
  width: 100%;
  height: auto;
  display: block;
  touch-action: none;
}

.sim-controls {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
  align-items: center;
}

.slider-group {
  flex: 1;
  min-width: 150px;
}

.slider-group label {
  display: block;
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--text-secondary);
  margin-bottom: 0.25rem;
}

input[type="range"] {
  width: 100%;
  -webkit-appearance: none;
  height: 8px;
  background: var(--bg-card);
  border-radius: 4px;
  outline: none;
  touch-action: manipulation;
  padding: 8px 0;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  box-shadow: 0 0 8px var(--accent-glow);
  border: 3px solid rgba(255,255,255,0.3);
}

/* ENERGY BAR */
.energy-bars {
  display: flex;
  gap: 0.5rem;
  margin: 0.5rem 0;
  align-items: flex-end;
  height: 100px;
  padding: 0.5rem;
  background: var(--bg-card);
  border-radius: 8px;
}

.e-bar-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100%;
}

.e-bar {
  width: 100%;
  max-width: 40px;
  flex: 1;
  display: flex;
  align-items: flex-end;
  border-radius: 4px 4px 0 0;
  overflow: hidden;
}

.e-bar-fill {
  width: 100%;
  border-radius: 4px 4px 0 0;
  transition: height 0.4s ease;
}

.e-bar-label {
  font-size: 0.65rem;
  font-weight: 700;
  margin-top: 0.2rem;
  color: var(--text-secondary);
  text-align: center;
}

.e-bar-value {
  font-size: 0.6rem;
  font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
}

/* HELP PANEL */
.help-panel {
  background: linear-gradient(135deg, rgba(78,205,196,0.08), rgba(108,92,231,0.08));
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  padding: 1rem;
  margin: 0.75rem 0;
}

.help-panel h4 {
  color: var(--accent);
  font-size: 0.9rem;
  margin-bottom: 0.4rem;
}

/* FORMULA */
.formula {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg-secondary);
  padding: 0.5rem 1rem;
  border-radius: 8px;
  border-left: 3px solid var(--accent);
  margin: 0.5rem 0;
  font-size: 0.9rem;
}

/* TOOLTIP */
.glossary-term {
  border-bottom: 1px dashed var(--accent);
  cursor: help;
  position: relative;
  color: var(--accent);
}

.glossary-term:hover::after {
  content: attr(data-def);
  position: absolute;
  bottom: 110%;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-card);
  color: var(--text-primary);
  padding: 0.5rem 0.75rem;
  border-radius: 8px;
  font-size: 0.8rem;
  white-space: normal;
  width: max-content;
  max-width: 260px;
  z-index: 999;
  border: 1px solid var(--accent);
  box-shadow: var(--shadow);
  font-weight: 400;
  line-height: 1.4;
}

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  justify-content: center;
  align-items: center;
  padding: 1rem;
}

.modal-overlay.show { display: flex; }

.modal {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 2rem;
  max-width: 500px;
  width: 100%;
  border: 1px solid var(--accent);
  max-height: 90vh;
  overflow-y: auto;
}

/* TABS */
.tab-row {
  display: flex;
  gap: 0.25rem;
  margin-bottom: 1rem;
  border-bottom: 2px solid var(--border);
  padding-bottom: 0.25rem;
}

.tab-btn {
  padding: 0.5rem 1rem;
  background: none;
  border: none;
  color: var(--text-secondary);
  font-family: inherit;
  font-weight: 700;
  font-size: 0.85rem;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: var(--transition);
}

.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* SELF-ASSESSMENT */
.rating-scale {
  display: flex;
  gap: 0.5rem;
  margin: 0.5rem 0;
}

.rating-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--bg-secondary);
  color: var(--text-primary);
  font-family: inherit;
  font-weight: 700;
  font-size: 0.9rem;
  cursor: pointer;
  transition: var(--transition);
  touch-action: manipulation;
  -webkit-user-select: none;
  user-select: none;
}

.rating-btn:hover, .rating-btn.selected {
  border-color: var(--accent);
  background: var(--accent);
  color: var(--bg-primary);
}

/* RESPONSIVE – iPad Portrait (768-1024) */
@media (min-width: 768px) and (max-width: 1024px) {
  .app-container { max-width: 720px; padding: 1.5rem; }
  .nav-bar { gap: 0.3rem; padding: 0.4rem; }
  .nav-btn { font-size: 0.85rem; padding: 0.65rem 0.6rem; min-height: 48px; }
  .nav-btn .nav-icon { font-size: 1.3rem; }
  .card { padding: 1.5rem; }
  h1 { font-size: 2rem; }
  h2 { font-size: 1.5rem; }
  .level-grid { grid-template-columns: repeat(4, 1fr); gap: 1rem; }
  .badge-grid { grid-template-columns: repeat(4, 1fr); gap: 1rem; }
  .stat-grid { grid-template-columns: repeat(4, 1fr); }
  .option-btn { padding: 1rem 1.2rem; font-size: 1rem; }
  .sim-controls { gap: 1rem; }
  .slider-group { min-width: 180px; }
  .avatar-select { gap: 1rem; }
  .avatar-option { width: 72px; height: 72px; font-size: 2.2rem; }
  .rating-btn { width: 48px; height: 48px; font-size: 1rem; }
  .match-item { padding: 0.75rem 1rem; font-size: 0.9rem; min-height: 44px; }
  .diagram-option { padding: 0.75rem; min-height: 48px; }
  .teacher-level-grid { grid-template-columns: repeat(4, 1fr); gap: 0.4rem; }
}

/* RESPONSIVE – iPad Landscape (1024+) */
@media (min-width: 1024px) {
  .app-container { max-width: 860px; }
  .nav-btn { font-size: 0.9rem; padding: 0.7rem 0.8rem; }
  .level-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  .stat-grid { grid-template-columns: repeat(4, 1fr); }
  .sim-container { padding: 1.5rem; }
}

/* RESPONSIVE – iPhone / small screens */
@media (max-width: 600px) {
  .app-container { padding: 0.5rem; }
  h1 { font-size: 1.4rem; }
  .nav-btn { font-size: 0.65rem; padding: 0.5rem 0.2rem; min-width: 50px; }
  .nav-btn .nav-icon { font-size: 1rem; }
  .level-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
  .badge-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
  .card { padding: 1rem; }
  .avatar-select { gap: 0.5rem; }
  .avatar-option { width: 52px; height: 52px; font-size: 1.6rem; }
  .teacher-panel { width: 260px; right: 0.5rem; bottom: 4.5rem; }
}

/* Safari-specific: prevent elastic overscroll on body */
@supports (-webkit-touch-callout: none) {
  body { overscroll-behavior: none; }
  .screen { -webkit-overflow-scrolling: touch; }
  /* Fix 100vh issue in Safari */
  .app-container { min-height: -webkit-fill-available; }
}

/* Hover only on devices that support it (not touch) */
@media (hover: none) {
  .option-btn:hover:not(:disabled) { border-color: var(--border); background: var(--bg-secondary); }
  .level-card:hover:not(.locked) { transform: none; }
  .btn-primary:hover { transform: none; }
  .match-item:hover { border-color: var(--border); }
}

/* FONT SIZE OVERRIDES */
body.font-small { --font-size-base: 14px; }
body.font-large { --font-size-base: 18px; }

/* SECTIONS */
.screen { display: none; }
.screen.active { display: block; }

/* Misc */
.flex { display: flex; }
.flex-wrap { flex-wrap: wrap; }
.gap-sm { gap: 0.5rem; }
.gap-md { gap: 1rem; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.mt-1 { margin-top: 0.5rem; }
.mt-2 { margin-top: 1rem; }
.mt-3 { margin-top: 1.5rem; }
.mb-1 { margin-bottom: 0.5rem; }
.mb-2 { margin-bottom: 1rem; }
.text-center { text-align: center; }
.text-sm { font-size: 0.85rem; }
.text-xs { font-size: 0.75rem; }
.text-muted { color: var(--text-secondary); }
.text-accent { color: var(--accent); }
.text-success { color: var(--success); }
.text-warning { color: var(--warning); }
.text-danger { color: var(--danger); }
.fw-bold { font-weight: 700; }
.mono { font-family: 'JetBrains Mono', monospace; }
.hidden { display: none !important; }
.inline-block { display: inline-block; }

.tag {
  display: inline-block;
  padding: 0.15rem 0.5rem;
  border-radius: 6px;
  font-size: 0.7rem;
  font-weight: 700;
}

.tag-basis { background: rgba(78,205,196,0.15); color: var(--accent); }
.tag-standard { background: rgba(162,155,254,0.15); color: var(--accent5); }
.tag-expert { background: rgba(255,217,61,0.15); color: var(--accent3); }

.divider {
  height: 1px;
  background: var(--border);
  margin: 1rem 0;
}

.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 0.75rem;
}

.stat-card {
  background: var(--bg-secondary);
  border-radius: var(--radius);
  padding: 0.75rem;
  text-align: center;
  border: 1px solid var(--border);
}

.stat-value {
  font-size: 1.5rem;
  font-weight: 900;
  color: var(--accent);
}

.stat-label {
  font-size: 0.7rem;
  color: var(--text-secondary);
  font-weight: 600;
}

/* Notification */
.notification {
  position: fixed;
  top: 1rem;
  right: 1rem;
  background: var(--bg-card);
  border: 1px solid var(--accent);

// STATE
// ============================================================
const DEFAULT_STATE = {
  version: 2,
  name: '',
  avatar: '🧑‍🔬',
  xp: 0,
  currentLevel: 0,
  onboardingDone: false,
  preTestScore: 0,
  levels: {},
  answers: [],
  badges: [],
  journal: [],
  selfAssessments: {},
  settings: { fontSize: 'medium' },
  totalTime: 0,
  sessionStart: Date.now()
};

let S = JSON.parse(JSON.stringify(DEFAULT_STATE));

function initLevelState(lvl) {
  if (!S.levels[lvl]) {
    S.levels[lvl] = {
      unlocked: lvl === 0,
      completed: false,
      difficulty: 'basis',
      score: 0,
      attempts: 0,
      hintsUsed: {},
      taskAttempts: {},
      taskResults: {},
      xpEarned: 0,
      timeSpent: 0,
      startTime: null
    };
  }
}

for (let i = 0; i <= 10; i++) initLevelState(i);

// ============================================================
// SAVE / LOAD
// ============================================================
function saveState() {
  try {
    localStorage.setItem('energielab_state', JSON.stringify(S));
  } catch(e) {}
}

function loadState() {
  try {
    const d = localStorage.getItem('energielab_state');
    if (d) { S = JSON.parse(d); return true; }
  } catch(e) {}
  return false;
}

function stateToPassword() {
  // 16-char code: encode xp(0-9999) + currentLevel(0-10) + 11 scores (0-9 each, score/11)
  // Format: 4 chars xp (base36) + 1 char level (0-a) + 11 chars scores (0-9)
  const chars = '0123456789ABCDEFGHJKLMNPQRSTUVWXYZ'; // no I,O to avoid confusion
  let code = '';
  // XP: 0-9999 → 3 chars base34
  let xp = Math.min(S.xp, 39303); // max 34^3-1
  code += chars[Math.floor(xp/1156)] + chars[Math.floor((xp%1156)/34)] + chars[xp%34];
  // Current level: 0-10 → 1 char
  code += chars[Math.min(S.currentLevel, 10)];
  // 11 level scores: each 0-100 mapped to 0-9, + completed bit
  // Use 0-9 for incomplete (score/11), A-J for completed (score/11)
  for (let i = 0; i <= 10; i++) {
    const ls = S.levels[i];
    const s = Math.min(Math.floor(ls.score / 11), 9);
    code += ls.completed ? chars[s + 10] : chars[s]; // 0-9 = incomplete, A-J = complete
  }
  // Add 1 checksum char
  let sum = 0;
  for (let i = 0; i < code.length; i++) sum += chars.indexOf(code[i]) * (i + 1);
  code += chars[sum % 34];
  return code.match(/.{1,4}/g).join(' '); // e.g. "00A3 E900 0000 00K7"
}

function passwordToState(pw) {
  try {
    const chars = '0123456789ABCDEFGHJKLMNPQRSTUVWXYZ';
    const c = pw.trim().replace(/\s+/g, '').toUpperCase();
    if (c.length !== 16) return false;
    // Verify checksum
    let sum = 0;
    for (let i = 0; i < 15; i++) sum += chars.indexOf(c[i]) * (i + 1);
    if (chars[sum % 34] !== c[15]) return false;
    // Decode XP
    S.xp = chars.indexOf(c[0]) * 1156 + chars.indexOf(c[1]) * 34 + chars.indexOf(c[2]);
    // Current level
    S.currentLevel = chars.indexOf(c[3]);
    if (S.currentLevel > 10) S.currentLevel = 10;
    // 11 scores
    for (let i = 0; i <= 10; i++) {
      if (!S.levels[i]) initLevelState(i);
      const v = chars.indexOf(c[4 + i]);
      if (v >= 10) { // A-J = completed
        S.levels[i].score = (v - 10) * 11;
        S.levels[i].completed = true;
      } else {
        S.levels[i].score = v * 11;
        S.levels[i].completed = false;
      }
      S.levels[i].unlocked = true;
    }
    for (let i = 0; i <= Math.min(S.currentLevel + 1, 10); i++) S.levels[i].unlocked = true;
    S.onboardingDone = true;
    saveState();
    return true;
  } catch(e) {}
  return false;
}

setInterval(saveState, 30000);

function addXP(amount, reason) {
  S.xp += amount;

  saveState();

function getXPForAttempt(baseXP, attempt, hintsUsed) {
  const attemptMult = [1, 0.8, 0.6, 0.4][Math.min(attempt - 1, 3)];
  const hintMult = [1, 0.8, 0.6, 0.4][Math.min(hintsUsed, 3)];
  return Math.round(baseXP * attemptMult * hintMult);
}

const GLOSSARY = {
  'Energie': 'Die Fähigkeit eines Körpers, Arbeit zu verrichten oder Wärme abzugeben. Einheit: Joule (J).',
  'Lageenergie': 'Energie, die ein Körper aufgrund seiner Höhe über dem Boden besitzt. Formel: E_pot = m · g · h',
  'Kinetische Energie': 'Bewegungsenergie eines Körpers. Formel: E_kin = ½ · m · v²',
  'Spannenergie': 'Energie, die in einem elastisch verformten Körper (z.B. Feder) gespeichert ist. Formel: E_sp = ½ · D · s²',
  'Energieerhaltung': 'In einem abgeschlossenen System bleibt die Gesamtenergie erhalten. Energie kann nur umgewandelt, nicht erzeugt oder vernichtet werden.',
  'Leistung': 'Energie pro Zeiteinheit. Formel: P = E / t. Einheit: Watt (W)',
  'Joule': 'SI-Einheit der Energie. 1 J = 1 kg·m²/s²',
  'Watt': 'SI-Einheit der Leistung. 1 W = 1 J/s',
  'Reibung': 'Kraft, die der Bewegung entgegenwirkt und mechanische Energie in Wärme umwandelt.',
  'Federkonstante': 'Maß für die Steifigkeit einer Feder. Einheit: N/m. Formelzeichen: D',
};

function getAvatar() { return S.avatar || '🧑‍🔬'; }
function getAvatarName() {
  const a = AVATARS.find(a => a.icon === S.avatar);
  return a ? a.name : 'Dr. Energie';
}
function getAvatarData() {
  return AVATARS.find(a => a.icon === S.avatar) || AVATARS[0];
}

function avatarBubble(text, mood) {
  const moodEmojis = { happy: '😊', think: '🤔', tip: '💡', cheer: '🎉', sad: '😟', cool: '😎' };
  const moodIcon = moodEmojis[mood] || '';
  return `
    <div class="avatar-bubble">
      <div class="avatar-bubble-icon">${getAvatar()}</div>
      <div class="avatar-bubble-text">
        <div class="avatar-bubble-name">${getAvatarName()} ${moodIcon}</div>
        <p class="text-sm">${text}</p>
      </div>
    </div>
  `;
}

function getCorrectPhrase() {
  const ad = getAvatarData();
  return ad.correct[Math.floor(Math.random() * ad.correct.length)];
}

function getIncorrectPhrase() {
  const ad = getAvatarData();
  return ad.incorrect[Math.floor(Math.random() * ad.incorrect.length)];
}

function getHintIntro(level) {
  const ad = getAvatarData();
  const idx = Math.min(level, ad.hintIntros.length - 1);
  return ad.hintIntros[idx];
}

let preTestIdx = 0;
let preTestScore = 0;

function startPreTest() {
  preTestIdx = 0;
  preTestScore = 0;
  renderPreTestQ();
}

function renderPreTestQ() {
  const el = document.getElementById('screen-onboarding');
  if (preTestIdx >= PRE_TEST.length) {
    finishPreTest();
    return;
  }
  const t = PRE_TEST[preTestIdx];
  el.innerHTML = `
    <div class="card">
      <div class="flex justify-between items-center mb-1">
        <h2>🧪 Vorwissenstest</h2>
        <span class="text-sm text-muted">Frage ${preTestIdx + 1}/${PRE_TEST.length}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${(preTestIdx / PRE_TEST.length) * 100}%"></div></div>
      <p class="fw-bold mt-2">${t.q}</p>
      <div class="mt-1">
        ${t.options.map((o, i) => `<button class="option-btn" onclick="answerPreTest(${i})">${o}</button>`).join('')}
      </div>
    </div>
  `;
}

function answerPreTest(idx) {
  if (idx === PRE_TEST[preTestIdx].correct) preTestScore++;
  preTestIdx++;
  renderPreTestQ();
}

function finishPreTest() {
  S.preTestScore = preTestScore;
  let startLevel = 0;
  if (preTestScore >= 5) startLevel = 2;
  else if (preTestScore >= 3) startLevel = 1;

  S.currentLevel = startLevel;
  for (let i = 0; i <= startLevel; i++) {
    S.levels[i].unlocked = true;
  }
  S.onboardingDone = true;
  saveState();

  const el = document.getElementById('screen-onboarding');
  const name = S.name ? `, ${S.name}` : '';
  el.innerHTML = `
    <div class="card card-glow text-center">
      <div style="font-size:3rem;">🎯</div>
      <h2>Ergebnis: ${preTestScore}/${PRE_TEST.length}</h2>

    </div>
  `;

// ============================================================
// GAME ENGINE
// ============================================================
let currentLevelData = null;
let currentTasks = [];
let currentTaskIdx = 0;
let currentCorrect = 0;
let currentHints = 0;
let currentAttempts = 0;
let levelStartTime = 0;
let matchState = {};

function startLevel(lvlId) {
  currentLevelData = LEVELS[lvlId];
  const ls = S.levels[lvlId];

  // Determine difficulty
  if (ls.attempts > 0 && ls.score >= 80) {
    ls.difficulty = 'expert';
  } else if (ls.attempts > 0 && ls.score >= 60) {
    ls.difficulty = 'standard';
  } else {
    ls.difficulty = 'basis';
  }

  // Build task list
  const tasks = currentLevelData.tasks;
  currentTasks = [...tasks.basis];
  if (ls.difficulty === 'standard' || ls.difficulty === 'expert') {
    currentTasks.push(...(tasks.standard || []));
  }
  if (ls.difficulty === 'expert') {
    currentTasks.push(...(tasks.expert || []));
  }

  currentTaskIdx = 0;
  currentCorrect = 0;
  currentHints = 0;
  currentAttempts = 0;
  simQIdx = 0;
  simQCorrect = 0;
  levelStartTime = Date.now();
  ls.attempts++;
  ls.startTime = Date.now();

  // Show self-assessment before
  showSelfAssessment('before', lvlId);
}

function showSelfAssessment(phase, lvlId) {
  const el = document.getElementById('screen-game');
  showScreen('game');
  if (teacherMode) updateTeacherPanel();
  
  el.innerHTML = `

function submitAssessment(phase, lvlId, value) {
  if (!S.selfAssessments[lvlId]) S.selfAssessments[lvlId] = {};
