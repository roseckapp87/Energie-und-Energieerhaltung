let teacherMode = false;

function showTeacherLogin() {
  showModal(`
    <h2 style="color:#e17055;">🎓 Lehrer-Login</h2>
    <p class="text-sm text-muted mt-1">Gib das Lehrer-Passwort ein, um den Navigationsmodus zu aktivieren.</p>
    <input type="password" id="teacherPwInput" placeholder="Passwort..." class="mt-1" onkeydown="if(event.key==='Enter')attemptTeacherLogin()">
    <div id="teacherLoginError" class="mt-1"></div>
    <div class="flex gap-sm mt-2">
      <button class="btn btn-primary" onclick="attemptTeacherLogin()">🔓 Einloggen</button>
      <button class="btn btn-secondary" onclick="closeModal()">Abbrechen</button>
    </div>
  `);
  setTimeout(() => document.getElementById('teacherPwInput')?.focus(), 100);
}

function attemptTeacherLogin() {
  const pw = document.getElementById('teacherPwInput').value;
  if (pw === 'Ros1803') {
    teacherMode = true;
    closeModal();
    document.getElementById('teacherFab').style.display = 'flex';
    // Unlock all levels
    for (let i = 0; i <= 10; i++) {
      S.levels[i].unlocked = true;
    }
    S.onboardingDone = true;
    saveState();
    showNotification('🎓 Lehrer-Modus aktiviert!', '');
    document.getElementById('mainNav').style.display = 'flex';
    updateTeacherPanel();
    renderSettings();
  } else {
    document.getElementById('teacherLoginError').innerHTML = '<p class="text-danger text-sm fw-bold">❌ Falsches Passwort!</p>';
    document.getElementById('teacherPwInput').value = '';
    document.getElementById('teacherPwInput').focus();
  }
}

function deactivateTeacher() {
  teacherMode = false;
  document.getElementById('teacherFab').style.display = 'none';
  document.getElementById('teacherPanel').classList.remove('show');
  showNotification('🔒 Lehrer-Modus deaktiviert.', '');
  renderSettings();
}

function toggleTeacherPanel() {
  const panel = document.getElementById('teacherPanel');
  panel.classList.toggle('show');
  if (panel.classList.contains('show')) updateTeacherPanel();
}

function updateTeacherPanel() {
  if (!teacherMode) return;
  const ctrl = document.getElementById('teacherControls');
  const inGame = currentLevelData !== null && document.getElementById('screen-game').classList.contains('active');

  let html = '';

  // Current context info
  if (inGame && currentLevelData) {
    html += `
      <p class="text-xs text-muted">Aktuell: Level ${currentLevelData.id} – ${currentLevelData.title}</p>
      <p class="text-xs text-muted">Aufgabe ${currentTaskIdx + 1}/${currentTasks.length}</p>
      <div class="teacher-divider"></div>
      <button class="teacher-btn" style="background:rgba(225,112,85,0.15);border-color:#e17055;font-size:0.85rem;" onclick="teacherSkipToFinish()">⏩ Nächstes Level →</button>
      <div class="teacher-divider"></div>
      <p class="text-xs fw-bold" style="color:#e17055;">Steuerung:</p>
      <button class="teacher-btn" onclick="teacherSkipTask()">⏭️ Aufgabe überspringen</button>
      <button class="teacher-btn" onclick="teacherAutoCorrect()">✅ Als richtig werten</button>
      <button class="teacher-btn" onclick="teacherShowAnswer()">👁️ Lösung anzeigen</button>
      <button class="teacher-btn" onclick="teacherSkipToSim()">🔬 Zur Simulation</button>
      <button class="teacher-btn" onclick="teacherCompleteLevel()">🏁 Level abschließen</button>
      <div class="teacher-divider"></div>
    `;
  }

  // Level quick-jump
  html += `
    <p class="text-xs fw-bold" style="color:#e17055;">Level-Schnellzugriff:</p>
    <div class="teacher-level-grid">
      ${LEVELS.map(l => `
        <button class="teacher-level-btn" onclick="teacherJumpLevel(${l.id})" title="${l.title}">
          ${l.icon}<br>${l.id}
        </button>
      `).join('')}
    </div>
    <div class="teacher-divider"></div>
    <p class="text-xs fw-bold" style="color:#e17055;">Schnellaktionen:</p>
    <button class="teacher-btn" onclick="teacherUnlockAll()">🔓 Alle Level freischalten</button>
    <button class="teacher-btn" onclick="teacherCompleteAll()">✅ Alle Level abschließen</button>
    <button class="teacher-btn" onclick="teacherResetProgress()">🔄 Nur Fortschritt zurücksetzen</button>
    <button class="teacher-btn" onclick="showScreen('dashboard');toggleTeacherPanel()">📊 Zum Dashboard</button>
  `;

  ctrl.innerHTML = html;
}

function teacherSkipTask() {
  if (!currentLevelData) return;
  currentTaskIdx++;
  currentCorrect++;
  if (currentTaskIdx >= currentTasks.length) {
    showSelfAssessment('after', currentLevelData.id);
  } else {
    renderTask();
  }
  updateTeacherPanel();
}

function teacherAutoCorrect() {
  if (!currentLevelData || currentTaskIdx >= currentTasks.length) return;
  const task = currentTasks[currentTaskIdx];
  const taskKey = `${currentLevelData.id}-${currentTaskIdx}`;
  S.levels[currentLevelData.id].taskAttempts[taskKey] = 1;
  S.levels[currentLevelData.id].hintsUsed[taskKey] = 0;
  handleCorrect(task, taskKey);
  updateTeacherPanel();
}

function teacherShowAnswer() {
  if (!currentLevelData || currentTaskIdx >= currentTasks.length) return;
  const task = currentTasks[currentTaskIdx];
  let answerText = '';
  
  if (task.type === 'choice') {
    answerText = `Richtige Antwort: <strong>${task.options[task.correct]}</strong> (Option ${task.correct + 1})`;
  } else if (task.type === 'calc') {
    answerText = `Richtige Antwort: <strong>${task.answer} ${task.unit}</strong> (±${task.tolerance})`;
  } else if (task.type === 'match') {
    answerText = task.pairs.map(p => `${p[0]} → ${p[1]}`).join('<br>');
  } else if (task.type === 'slider') {
    answerText = `Richtige Antwort: <strong>${task.answer} ${task.unit}</strong> (±${task.tolerance})`;
  } else if (task.type === 'sort') {
    answerText = `Richtige Reihenfolge:<br>${task.items.map((it,i) => `${i+1}. ${it}`).join('<br>')}`;
  } else if (task.type === 'fillin') {
    answerText = task.blanks.map((b,i) => `Lücke ${i+1}: <strong>${b.correct}</strong>`).join('<br>');
  } else if (task.type === 'diagram') {
    const correctIdx = task.options.findIndex(o => o.correct);
    answerText = `Richtige Antwort: <strong>${task.options[correctIdx].label}</strong>`;
  } else {
    answerText = `Erklärung: ${task.explain}`;
    if (task.acceptWords) answerText += `<br>Schlüsselwörter: ${task.acceptWords.join(', ')}`;
  }

  showModal(`
    <h2 style="color:#e17055;">👁️ Lösung – Aufgabe ${currentTaskIdx + 1}</h2>
    <div class="help-panel mt-1">
      <p class="fw-bold text-sm">${task.q}</p>
    </div>
    <div class="card mt-1" style="background:var(--bg-secondary);">
      <p class="text-sm">${answerText}</p>
    </div>
    <div class="card mt-1" style="background:var(--bg-secondary);">
      <p class="text-xs text-muted fw-bold">Erklärung:</p>
      <p class="text-sm">${task.explain}</p>
    </div>
    ${task.hints ? `<div class="card mt-1" style="background:var(--bg-secondary);">
      <p class="text-xs text-muted fw-bold">Hilfen:</p>
      ${task.hints.map((h,i) => `<p class="text-sm">${i+1}. ${h}</p>`).join('')}
    </div>` : ''}
    <button class="btn btn-secondary btn-block mt-2" onclick="closeModal()">Schließen</button>
  `);
}

function teacherSkipToSim() {
  if (!currentLevelData) return;
  showSimulation();
  updateTeacherPanel();
}

function teacherSkipPhase(phase, lvlId) {
  // Skip self-assessment
  if (phase === 'before') {
    // Skip to simulation
    showSimulation();
  } else {
    // Skip to finish
    currentCorrect = currentTasks.length;
    finishLevel(lvlId);
  }
}

function teacherSkipToFinish() {
  if (!currentLevelData) return;
  // Stop animation if running
  cancelAnimationFrame(parseInt(document.getElementById('simCanvas')?.dataset.animId) || 0);
  // Complete level and go to next
  const lvlId = currentLevelData.id;
  const ls = S.levels[lvlId];
  ls.completed = true;
  ls.score = 100;
  ls.xpEarned = 100;
  ls.timeSpent = Date.now() - levelStartTime;
  if (lvlId < 10) {
    S.levels[lvlId + 1].unlocked = true;
    S.currentLevel = Math.max(S.currentLevel, lvlId + 1);
  }
  saveState();
  // Auto-jump to next level
  if (lvlId < 10) {
    showNotification(`✅ Level ${lvlId} übersprungen → Level ${lvlId + 1}`, '');
    startLevel(lvlId + 1);
  } else {
    showNotification(`✅ Level ${lvlId} übersprungen – Alle Level fertig!`, '');
    showScreen('dashboard');
  }
}

function teacherCompleteLevel() {
  if (!currentLevelData) return;
  const lvlId = currentLevelData.id;
  const ls = S.levels[lvlId];
  ls.completed = true;
  ls.score = 100;
  ls.xpEarned = 100;
  if (lvlId < 10) {
    S.levels[lvlId + 1].unlocked = true;
    S.currentLevel = Math.max(S.currentLevel, lvlId + 1);
  }
  saveState();
  showNotification(`✅ Level ${lvlId} abgeschlossen (100%)`, '');
  showScreen('dashboard');
  updateTeacherPanel();
}

function teacherJumpLevel(lvlId) {
  S.levels[lvlId].unlocked = true;
  saveState();
  document.getElementById('teacherPanel').classList.remove('show');
  startLevel(lvlId);
  setTimeout(updateTeacherPanel, 100);
}

function teacherUnlockAll() {
  for (let i = 0; i <= 10; i++) S.levels[i].unlocked = true;
  saveState();
  showNotification('🔓 Alle Level freigeschaltet!', '');
  updateTeacherPanel();
}

function teacherCompleteAll() {
  for (let i = 0; i <= 10; i++) {
    S.levels[i].unlocked = true;
    S.levels[i].completed = true;
    S.levels[i].score = 100;
  }
  S.xp = 2000;
  saveState();
  showNotification('✅ Alle Level abgeschlossen!', '');
  showScreen('dashboard');
  updateTeacherPanel();
}

function teacherResetProgress() {
  showModal(`
    <h2 style="color:#e17055;">🔄 Fortschritt zurücksetzen?</h2>
    <p class="text-sm mt-1">Der Fortschritt wird zurückgesetzt, aber der Lehrer-Modus bleibt aktiv.</p>
    <div class="flex gap-sm mt-2">
      <button class="btn btn-danger" onclick="doTeacherReset()">Zurücksetzen</button>
      <button class="btn btn-secondary" onclick="closeModal()">Abbrechen</button>
    </div>
  `);
}

function doTeacherReset() {
  const wasTeacher = teacherMode;
  S = JSON.parse(JSON.stringify(DEFAULT_STATE));
  for (let i = 0; i <= 10; i++) initLevelState(i);
  S.onboardingDone = true;
  for (let i = 0; i <= 10; i++) S.levels[i].unlocked = true;
  saveState();
  teacherMode = wasTeacher;
  closeModal();
  showScreen('dashboard');
  showNotification('🔄 Fortschritt zurückgesetzt!', '');
  updateTeacherPanel();
}

// ============================================================
// INIT
// ============================================================
function applySettings() {
  document.body.classList.remove('font-small', 'font-large');
  if (S.settings.fontSize === 'small') document.body.classList.add('font-small');
  if (S.settings.fontSize === 'large') document.body.classList.add('font-large');
}

function init() {
  const hasState = loadState();

  if (hasState && S.onboardingDone) {
    applySettings();
    document.getElementById('mainNav').style.display = 'flex';
    showScreen('dashboard');
  } else {
    renderOnboarding();
  }
}

init();
</script>
</body>
</html>
